<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>N3 文法</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #fffffe;
    --surface: #faf8f4;
    --surface2: #f0ede6;
    --accent1: #c1121f;
    --accent2: #b45309;
    --accent3: #2d6a4f;
    --accent4: #1d4ed8;
    --accent5: #7c3aed;
    --accent6: #e85d04;
    --text: #0f0e17;
    --text-dim: #5a5f7a;
    --border: rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html{font-size:16px;}
body {
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #2a2a2a 0%, #222233 50%, #2a2a2a 100%);
    border-bottom: 1px solid #404040;
    padding: 28px 24px 20px;
    text-align: center;
    /* border handled inline */
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    background: linear-gradient(90deg, #e05252, #c89a00, #2e9e4f, #2563eb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.04em;
  }
  header p { color: #3a3f5a; font-size: 0.8rem; margin-top: 4px; }

  /* ── SEARCH ── */
  .search-bar {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    position: sticky;
    top: 42px;
    z-index: 99;
  }
  .search-bar input {
    flex: 1;
    min-width: 180px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent4); }
  .search-bar input::placeholder { color: #3a3f5a; }

  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: #3a3f5a;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent4);
    color: #fff;
    border-color: var(--accent4);
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 12px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    color: #3a3f5a;
    flex-wrap: wrap;
  }
  .stats-bar span { display: flex; align-items: center; gap: 5px; }
  .stats-bar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  /* ── LESSON GRID ── */
  .lessons-grid {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── LESSON CARD ── */
  .lesson-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .lesson-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(37,99,235,0.10);
  }
  .lesson-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .lesson-num {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .lesson-title { font-weight: 700; font-size: 0.95rem; line-height: 1.3; }
  .lesson-subtitle { font-size:  0.82rem; color: #3a3f5a; margin-top: 2px; }

  .lesson-toggle {
    margin-left: auto;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .lesson-card.open .lesson-toggle { transform: rotate(180deg); }

  .lesson-body {
    display: none;
    padding: 0 18px 18px;
    gap: 12px;
    flex-direction: column;
  }
  .lesson-card.open .lesson-body { display: flex; }

  /* ── GRAMMAR NODE (card inside card) ── */
  .grammar-node {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px;
    border-left: 3px solid;
    position: relative;
    overflow: hidden;
  }
  .grammar-node::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    border-radius: 50%;
    opacity: 0.04;
    background: currentColor;
    transform: translate(20px, -20px);
  }

  .grammar-pattern {
    font-size: 1.0rem;
    font-weight: 700;
    font-family: 'Noto Serif JP', serif;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .meaning-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size:  0.82rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.08);
  }
  .grammar-meaning {
    font-size: 0.78rem;
    color: #3a3f5a;
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .grammar-structure {
    font-size:  0.82rem;
    background: #f0f4ff;
    border: 1px solid #d6e0ff;
    padding: 5px 10px;
    border-radius: 6px;
    margin-bottom: 10px;
    font-family: 'Noto Sans JP', monospace;
    color: #2563eb;
    line-height: 1.5;
  }

  .examples-label {
    font-size:  0.82rem;
    font-weight: 700;
    color: #3a3f5a;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .example {
    font-size: 0.8rem;
    line-height: 1.8;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .example:last-child { border-bottom: none; }
  .example .jp {
    font-family: 'Noto Serif JP', serif;
    color: var(--text);
    line-height: 2;
  }
  .example .vn {
    color: #1a1d2e;
    font-size:  0.82rem;
    line-height: 1.4;
  }

  /* furigana */
  ruby { ruby-align: center; }
  rt {
    font-size: 0.65em;
    color: #60a5fa;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
  }

  /* memory tip */
  .memory-tip {
    background: #fff8d6;
    border: 1px solid #f0d060;
    border-radius: 8px;
    padding: 8px 12px;
    font-size:  0.82rem;
    margin-top: 8px;
    line-height: 1.5;
    color: #7a5800;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .memory-tip::before { content: '💡'; flex-shrink: 0; }

  /* compare */
  .compare-note {
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 8px;
    padding: 8px 12px;
    font-size:  0.82rem;
    margin-top: 8px;
    line-height: 1.5;
    color: #1e40af;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .compare-note::before { content: '⚖️'; flex-shrink: 0; }

  /* progress */
  .progress-wrap { padding: 0 20px 10px; max-width: 1400px; margin: 0 auto; }
  .progress-bar-bg {
    height: 4px; background: var(--surface2); border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4d96ff, #c77dff);
    border-radius: 4px;
    width: 0;
    transition: width 0.8s ease;
  }

  /* mastered toggle */
  .mastered-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size:  0.82rem;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid #c5cae0;
    background: transparent;
    color: #3a3f5a;
    cursor: pointer;
    margin-top: 8px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .mastered-btn.done {
    background: #f0fdf4;
    border-color: #2e9e4f;
    color: #166534;
  }

  /* hidden */
  .hidden { display: none !important; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #c5cae0; border-radius: 3px; }


/* ── 3 TABS ── */
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #dde3f5;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.tab-btn{flex:1;padding:12px 4px;border:none;background:none;font-family:inherit;font-size:.78rem;font-weight:700;color:#888;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.tab-btn.active{color:#2563eb;border-bottom-color:#2563eb;background:#f0f6ff;}

/* ── ÔN LUYỆN (Drill) ── */
.drill-wrap{max-width:520px;margin:0 auto;padding:16px;}
.drill-hero{background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:16px;padding:20px;color:#fff;text-align:center;margin-bottom:14px;}
.drill-hero h2{font-size:1.1rem;font-weight:800;margin-bottom:4px;}
.drill-hero p{font-size:.75rem;opacity:.85;}
.mode-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.mode-btn{background:#fff;border:2px solid #dde3f5;border-radius:12px;padding:14px;cursor:pointer;text-align:center;font-family:inherit;transition:all .18s;}
.mode-btn:hover,.mode-btn.active{border-color:#2563eb;background:#f0f6ff;}
.mode-btn .icon{font-size:1.5rem;margin-bottom:4px;}
.mode-btn .label{font-size:.8rem;font-weight:700;color:#1a1d2e;}
.mode-btn .sub{font-size:.65rem;color:#888;margin-top:2px;}

/* Drill question */
.drill-q-wrap{background:#fff;border-radius:14px;border:2px solid #dde3f5;padding:18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(37,99,235,.06);}
.drill-pattern{font-size:1.2rem;font-weight:800;color:#2563eb;font-family:'Noto Serif JP',serif;text-align:center;margin-bottom:4px;}
.drill-progress{font-size:.68rem;color:#888;text-align:center;margin-bottom:12px;}
.drill-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.drill-opt{padding:11px 8px;border-radius:10px;border:2px solid #e5e7eb;background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;color:#1a1d2e;}
.drill-opt:hover{border-color:#2563eb;background:#f0f6ff;}
.drill-opt.correct{background:#f0fdf4;border-color:#16a34a;color:#16a34a;}
.drill-opt.wrong{background:#fef2f2;border-color:#dc2626;color:#dc2626;}
.drill-fb{margin:10px 0 0;padding:10px 12px;border-radius:8px;font-size:.8rem;font-weight:600;line-height:1.6;display:none;}
.drill-fb.ok{background:#f0fdf4;color:#16a34a;}
.drill-fb.ng{background:#fef2f2;color:#dc2626;}
.drill-next{display:none;width:100%;margin-top:10px;padding:12px;border-radius:10px;border:none;background:#2563eb;color:#fff;font-family:inherit;font-size:.85rem;font-weight:800;cursor:pointer;}
.drill-result{text-align:center;padding:30px 20px;}
.drill-result .score{font-size:2.2rem;font-weight:900;color:#2563eb;}
.drill-result .sub{font-size:.85rem;color:#888;margin-bottom:20px;}

/* Flashcard */
.fc-wrap{max-width:520px;margin:0 auto;padding:16px;}
.fc-progress{font-size:.68rem;color:#888;text-align:center;margin-bottom:10px;}
.fc-scene{perspective:1200px;margin-bottom:12px;cursor:pointer;}
.fc-drag{transition:transform .3s;}
.fc-inner{position:relative;width:100%;height:220px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.fc-scene.flipped .fc-inner{transform:rotateY(180deg);}
.fc-face{position:absolute;top:0;left:0;width:100%;height:220px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.fc-front{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:2px solid #bfdbfe;}
.fc-back{background:linear-gradient(135deg,#f0fdf4,#dcfce7);transform:rotateY(180deg);border:2px solid #bbf7d0;}
.fc-pattern{font-size:1.2rem;font-weight:800;color:#1e40af;font-family:'Noto Serif JP',serif;margin-bottom:8px;}
.fc-hint{font-size:.72rem;color:#64748b;margin-top:8px;}
.fc-meaning{font-size:.92rem;font-weight:700;color:#166534;margin-bottom:8px;}
.fc-structure{font-size:.7rem;color:#15803d;background:#f0fdf4;padding:4px 8px;border-radius:6px;margin:4px 0;}
.fc-tip{font-size:.68rem;color:#1e40af;margin-top:6px;font-style:italic;}
.fc-controls{display:flex;gap:8px;margin-top:4px;}
.fc-btn{flex:1;padding:10px;border-radius:8px;border:2px solid #dde3f5;background:#fff;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s;}
.fc-btn.ok{border-color:#16a34a;color:#16a34a;}
.fc-btn.ok:hover{background:#f0fdf4;}
.fc-btn.skip{border-color:#888;color:#888;}
.fc-btn.skip:hover{background:#f5f5f5;}

/* Lesson select for drill */
.lesson-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:14px;}
.ls-btn{padding:10px 8px;border-radius:10px;border:2px solid #dde3f5;background:#fff;font-family:inherit;font-size:.72rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.ls-btn:hover,.ls-btn.sel{border-color:#2563eb;background:#eff6ff;}

/* ── LUYỆN ĐỀ (Exam) ── */
.exam-wrap{max-width:520px;margin:0 auto;}
.exam-list-hd{padding:12px 14px 4px;font-size:.75rem;font-weight:800;color:#888;}
.exam-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px;}
.exam-btn{background:#fff;border:2px solid #dde3f5;border-radius:12px;padding:14px 12px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.exam-btn:hover{border-color:#2563eb;background:#eff6ff;}
.exam-yr{font-size:.85rem;font-weight:800;color:#1a1d2e;}
.exam-cnt{font-size:.62rem;color:#888;margin-top:3px;}
.exam-sc{font-size:.62rem;font-weight:700;margin-top:4px;}
.year-sep{grid-column:1/-1;padding:6px 2px 2px;font-size:.62rem;font-weight:800;color:#888;letter-spacing:.08em;}

/* Exam taking */
.eq-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #eee;position:sticky;top:42px;background:#fff;z-index:99;}
.eq-back{background:none;border:none;font-size:1rem;cursor:pointer;color:#888;padding:2px 8px;border-radius:6px;}
.eq-back:hover{background:#f5f5f5;}
.eq-title{font-size:.88rem;font-weight:800;flex:1;}
.eq-prog{font-size:.68rem;color:#888;font-family:monospace;}
.eq-body{padding:10px 14px 6px;max-width:520px;margin:0 auto;}
.eq-num{display:inline-block;background:#eff6ff;color:#2563eb;border:1.5px solid #bfdbfe;border-radius:6px;font-size:.65rem;font-weight:800;padding:3px 10px;margin-bottom:8px;}
.eq-sent{font-family:'Noto Serif JP',sans-serif;font-size:.9rem;line-height:1.9;color:#1a1d2e;margin-bottom:10px;background:#f8faff;border-radius:10px;padding:12px 14px;border:1.5px solid #dde3f5;}
.eq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.eq-opt{padding:12px 9px;border-radius:10px;border:2px solid #e5e7eb;background:#fff;font-family:'Noto Serif JP','Noto Sans JP',sans-serif;font-size:.84rem;font-weight:700;cursor:pointer;text-align:center;transition:all .13s;color:#1a1d2e;}
.eq-opt:hover{border-color:#2563eb;background:#eff6ff;}
.eq-opt.chosen{background:#eff6ff;border-color:#2563eb;color:#1e40af;font-weight:800;}
.eq-opt.ok{background:#f0fdf4;border-color:#16a34a;color:#16a34a;}
.eq-opt.ng{background:#fef2f2;border-color:#dc2626;color:#dc2626;}
.eq-opt.rv{background:#f0fdf4;border-color:#16a34a;color:#16a34a;}
.eq-opt:disabled{cursor:default;}
.eq-fb{margin:8px 0 0;padding:10px 12px;border-radius:8px;font-size:.78rem;font-weight:600;line-height:1.7;display:none;}
.eq-fb.ok{background:#f0fdf4;color:#16a34a;}
.eq-fb.ng{background:#fef2f2;color:#dc2626;}
.eq-nxt{display:none;width:100%;margin-top:8px;padding:12px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-family:inherit;font-size:.82rem;font-weight:800;cursor:pointer;}
.eq-submit{width:auto;margin-top:0;padding:12px 16px;border-radius:8px;border:2px solid #e5e7eb;background:#fff;color:#888;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.eq-submit:hover{background:#f5f5f5;}

/* Exam result */
.eq-res{padding:24px 16px;text-align:center;max-width:520px;margin:0 auto;}
.eq-emoji{font-size:2.8rem;margin-bottom:8px;}
.eq-score{font-size:1.9rem;font-weight:900;color:#2563eb;margin-bottom:3px;font-family:monospace;}
.eq-pct{font-size:.82rem;color:#888;margin-bottom:16px;}
.eq-stats{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.eq-stat{background:#f5f5f5;border-radius:8px;padding:9px 14px;min-width:60px;text-align:center;}
.eq-rbtns{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.eq-rbtn{padding:11px 20px;border-radius:8px;font-family:inherit;font-size:.8rem;font-weight:800;cursor:pointer;border:2px solid #1a1d2e;}
.eq-rbtn.primary{background:#2563eb;color:#fff;border-color:#2563eb;}
.eq-rbtn.secondary{background:#fff;color:#1a1d2e;}
.eq-review{padding:0 14px 24px;max-width:520px;margin:0 auto;}
.eq-review-hd{font-size:.62rem;font-weight:800;color:#888;letter-spacing:.08em;padding:8px 0 6px;}
.rv-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.rv-item.ok{border:1.5px solid #16a34a;}
.rv-item.ng{border:1.5px solid #dc2626;}
.rv-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.rv-tag{font-size:.6rem;background:#eff6ff;color:#2563eb;padding:2px 7px;border-radius:20px;font-weight:800;}
.rv-status{font-size:.72rem;font-weight:800;}
.rv-q{font-size:.82rem;line-height:1.8;margin-bottom:6px;font-family:'Noto Serif JP',sans-serif;}
.rv-wrong{font-size:.72rem;background:#fef2f2;color:#dc2626;padding:4px 8px;border-radius:6px;margin-bottom:4px;}
.rv-correct{font-size:.72rem;background:#f0fdf4;color:#16a34a;padding:4px 8px;border-radius:6px;margin-bottom:4px;}
.rv-exp{font-size:.7rem;color:#555;padding:4px 8px;background:#fffbeb;border-radius:6px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:16px;padding:24px 20px;max-width:300px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:8px;color:#1a1d2e;}
.modal-sub{font-size:.82rem;color:#666;margin-bottom:18px;line-height:1.5;}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;padding:11px;border-radius:8px;font-family:inherit;font-size:.82rem;font-weight:800;cursor:pointer;border:2px solid #e5e7eb;}
.modal-btn.yes{background:#2563eb;color:#fff;border-color:#2563eb;}
.modal-btn.no{background:#fff;color:#1a1d2e;}
/* ── EXAM FILTER ── */
.exam-filter{display:flex;gap:6px;padding:8px 14px 4px;flex-wrap:wrap;}
.ef-btn{padding:5px 14px;border-radius:20px;border:2px solid #dde3f5;background:#fff;font-family:inherit;font-size:.75rem;font-weight:800;cursor:pointer;color:#888;transition:all .15s;}
.ef-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}
/* ── M2 SENTENCE ARRANGEMENT ── */
.m2-sent-wrap{background:#f8faff;border-radius:10px;padding:12px 14px;border:1.5px solid #dde3f5;margin-bottom:8px;}
.m2-pre-post{font-family:'Noto Serif JP',serif;font-size:.88rem;line-height:1.9;color:#1a1d2e;}
.m2-blanks-row{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0;}
.m2-blank{display:inline-flex;align-items:center;justify-content:center;padding:4px 12px;border-radius:6px;background:#e8edf8;font-size:.78rem;font-weight:800;min-width:44px;}
.m2-blank.star{background:#2563eb;color:#fff;}
.m2-hint{font-size:.65rem;color:#94a3b8;margin-top:4px;}
/* ── M3 PASSAGE ── */
.m3-passage-wrap{background:#fff;border-radius:12px;margin:0 14px 8px;padding:14px 16px;border:2px solid #dde3f5;box-shadow:0 2px 8px rgba(37,99,235,.06);}
.m3-ptitle-badge{font-size:.67rem;font-weight:800;color:#2563eb;background:#eff6ff;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:8px;}
.m3-ptext{font-family:'Noto Serif JP',serif;font-size:.84rem;line-height:2.1;color:#1a1d2e;}
.m3-bl{display:inline-block;background:#eff6ff;color:#2563eb;font-weight:800;border-bottom:2px solid #2563eb;padding:0 5px;border-radius:3px;min-width:28px;text-align:center;}
.m3-bl.cur{background:#2563eb;color:#fff;}

/* ── BOTTOM NAV ── */
.bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:300;box-shadow:0 -2px 10px rgba(0,0,0,.06);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 11px;cursor:pointer;font-size:.6rem;font-weight:700;color:var(--text-dim);border:none;background:none;font-family:inherit;gap:3px;position:relative;transition:all .2s;}
.bnav-item.active{color:var(--accent4);}
.bnav-item.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--accent4);border-radius:0 0 3px 3px;}
.bnav-icon{font-size:1.2rem;line-height:1;}
body{padding-bottom:68px;}

// Color palette for lesson numbers
const COLORS = ["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#c77dff","#ff9a3c"];

let masteredSet = new Set(JSON.parse(localStorage.getItem('n3_mastered') || '[]'));
let activeFilter = 'all';
let searchTerm = '';

function saveMastered() {
  try { localStorage.setItem('n3_mastered', JSON.stringify([...masteredSet])); } catch(e) {}
}

function totalGrammars() {
  return LESSONS.reduce((s, l) => s + l.grammars.length, 0);
}

function updateProgress() {
  const total = totalGrammars();
  const done = masteredSet.size;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressText').textContent = `${done} / ${total} đã thuộc`;
  document.getElementById('percentText').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function buildCard(lesson, colorIdx) {
  const color = lesson.color || COLORS[colorIdx % COLORS.length];
  const card = document.createElement('div');
  card.className = 'lesson-card';
  card.dataset.cat = (lesson.cat || []).join(' ');
  card.dataset.id = lesson.id;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'lesson-header';
  hdr.innerHTML = `
    <div class="lesson-num" style="background:${color}22;color:${color}">${lesson.id}</div>
    <div>
      <div class="lesson-title">${lesson.title}</div>
      <div class="lesson-subtitle">${lesson.subtitle}</div>
    </div>
    <div class="lesson-toggle">▼</div>
  `;
  hdr.addEventListener('click', () => {
    card.classList.toggle('open');
  });
  card.appendChild(hdr);

  // Body
  const body = document.createElement('div');
  body.className = 'lesson-body';

  lesson.grammars.forEach((g, gi) => {
    const nodeId = `${lesson.id}-${gi}`;
    const isMastered = masteredSet.has(nodeId);

    const node = document.createElement('div');
    node.className = 'grammar-node';
    node.style.borderColor = color;

    let examplesHtml = '';
    if (g.examples && g.examples.length) {
      examplesHtml = `<div class="examples-label">📝 Ví dụ</div>`;
      g.examples.forEach(ex => {
        examplesHtml += `<div class="example">
          <div class="jp">${ex.jp}</div>
          <div class="vn">→ ${ex.vn}</div>
        </div>`;
      });
    }

    const tipHtml = g.tip ? `<div class="memory-tip">${g.tip}</div>` : '';
    const compareHtml = g.compare ? `<div class="compare-note">${g.compare}</div>` : '';

    node.innerHTML = `
      <div class="grammar-pattern-row" style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
        <div class="grammar-pattern" style="color:${color};flex:1">${g.pattern}</div>
        <button class="g-tts-btn" title="Đọc" style="background:${color}22;border:1.5px solid ${color}44;color:${color};border-radius:8px;padding:4px 8px;font-size:.85rem;cursor:pointer;flex-shrink:0">🔊</button>
      </div>
      <span class="meaning-tag" style="background:${color}22;color:${color}">意味</span>
      <div class="grammar-meaning">${g.meaning}</div>
      ${g.structure ? `<div class="grammar-structure">📐 ${g.structure}</div>` : ''}
      ${examplesHtml}
      ${tipHtml}
      ${compareHtml}
      <button class="mastered-btn ${isMastered ? 'done' : ''}" data-nid="${nodeId}">
        ${isMastered ? '✅ Đã thuộc' : '☐ Đánh dấu thuộc'}
      </button>
    `;

    node.querySelector('.g-tts-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const btn = e.currentTarget;
      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        btn.textContent = '🔊';
      } else {
        readGrammarCard(g);
        btn.textContent = '⏹';
        const onEnd = () => { btn.textContent = '🔊'; };
        window.speechSynthesis.addEventListener('end', onEnd, {once:true});
      }
    });

    node.querySelector('.mastered-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const nid = e.currentTarget.dataset.nid;
      if (masteredSet.has(nid)) {
        masteredSet.delete(nid);
        e.currentTarget.textContent = '☐ Đánh dấu thuộc';
        e.currentTarget.classList.remove('done');
      } else {
        masteredSet.add(nid);
        e.currentTarget.textContent = '✅ Đã thuộc';
        e.currentTarget.classList.add('done');
      }
      saveMastered();
      updateProgress();
    });

    body.appendChild(node);
  });

  card.appendChild(body);
  return card;
}

function render() {
  const grid = document.getElementById('lessonsGrid');
  grid.innerHTML = '';
  let shown = 0;
  LESSONS.forEach((lesson, idx) => {
    const catMatch = activeFilter === 'all' || (lesson.cat || []).includes(activeFilter);
    const textMatch = searchTerm === '' ||
      lesson.title.toLowerCase().includes(searchTerm) ||
      lesson.subtitle.toLowerCase().includes(searchTerm) ||
      lesson.grammars.some(g =>
        g.pattern.includes(searchTerm) ||
        g.meaning.toLowerCase().includes(searchTerm) ||
        (g.tip || '').toLowerCase().includes(searchTerm)
      );
    if (catMatch && textMatch) {
      grid.appendChild(buildCard(lesson, idx));
      shown++;
    }
  });
  if (shown === 0) {
    grid.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim);grid-column:1/-1">🔍 Không tìm thấy kết quả phù hợp</div>';
  }
  updateProgress();
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    render();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase().trim();
  render();
});

render();

let drillPool=[], drillIdx=0, drillOk=0, drillNg=0;
let selectedLessons=new Set(['all']);

function initDrillHome(){
  const grid=document.getElementById('ls-grid');
  if(!grid) return;
  grid.innerHTML='';
  LESSONS.forEach(l=>{
    const b=document.createElement('button');
    b.className='ls-btn'+(selectedLessons.has(String(l.id))?' sel':'');
    b.id='ls-btn-'+l.id;
    b.textContent=l.id+'. '+l.title;
    b.onclick=()=>toggleLesson(String(l.id),b);
    grid.appendChild(b);
  });
}

function toggleLesson(id,btn){
  if(id==='all'){
    selectedLessons.clear();
    selectedLessons.add('all');
    document.querySelectorAll('#ls-grid .ls-btn').forEach(b=>b.classList.remove('sel'));
    document.getElementById('ls-all').classList.add('sel');
  } else {
    selectedLessons.delete('all');
    document.getElementById('ls-all').classList.remove('sel');
    if(btn.classList.contains('sel')){
      btn.classList.remove('sel');
      selectedLessons.delete(id);
      if(selectedLessons.size===0){
        selectedLessons.add('all');
        document.getElementById('ls-all').classList.add('sel');
      }
    } else {
      btn.classList.add('sel');
      selectedLessons.add(id);
    }
  }
}

function buildDrillPool(){
  const pool=[];
  LESSONS.forEach(l=>{
    if(!selectedLessons.has('all') && !selectedLessons.has(String(l.id))) return;
    l.grammars.forEach((g,gi)=>{
      // Build 4 options: correct + 3 distractors
      const correct = g.meaning;
      const allMeanings = LESSONS.flatMap(ll=>ll.grammars.map(gg=>gg.meaning)).filter(m=>m!==correct);
      const distractors=[];
      const shuffled=[...allMeanings].sort(()=>Math.random()-.5);
      for(const m of shuffled){if(distractors.length>=3)break;distractors.push(m);}
      const opts=[correct,...distractors].sort(()=>Math.random()-.5);
      pool.push({pattern:g.pattern,correct,opts,exp:g.tip||g.meaning,lessonId:l.id,gi});
    });
  });
  return pool.sort(()=>Math.random()-.5).slice(0,20);
}

function startDrillMode(){
  drillPool=buildDrillPool();
  drillIdx=0; drillOk=0; drillNg=0;
  document.getElementById('drill-home').style.display='none';
  document.getElementById('drill-res').style.display='none';
  document.getElementById('flashcard-view').style.display='none';
  document.getElementById('drill-q').style.display='block';
  showDrillQ();
}

function showDrillQ(){
  if(drillIdx>=drillPool.length){showDrillResult();return;}
  const q=drillPool[drillIdx];
  document.getElementById('dq-pattern').innerHTML=q.pattern;
  document.getElementById('dq-prog').textContent=`${drillIdx+1}/${drillPool.length}`;
  document.getElementById('dq-fb').style.display='none';
  document.getElementById('dq-next').style.display='none';
  const opts=document.getElementById('dq-opts');
  opts.innerHTML='';
  q.opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='drill-opt';
    b.textContent=o.length>30?o.substring(0,28)+'…':o;
    b.title=o;
    b.onclick=()=>answerDrill(b,o===q.correct,q);
    opts.appendChild(b);
  });
}

function answerDrill(btn,correct,q){
  if(btn.disabled) return;
  if(correct)drillOk++;else drillNg++;
  btn.classList.add(correct?'correct':'wrong');
  document.querySelectorAll('.drill-opt').forEach(b=>{
    if(b.textContent.trim()===q.correct.substring(0,28).trim()||b.title===q.correct) b.classList.add('correct');
    b.disabled=true;
  });
  const fb=document.getElementById('dq-fb');
  fb.className='drill-fb '+(correct?'ok':'ng');
  fb.innerHTML=(correct?'✅ Chính xác!':'❌ Sai rồi! Đáp án: <b>'+q.correct.substring(0,60)+'</b>')+(q.exp?'<br><span style="font-weight:400">💡 '+q.exp+'</span>':'');
  fb.style.display='block';
  document.getElementById('dq-next').style.display='block';
}

function drillNext(){
  drillIdx++;
  showDrillQ();
}

function showDrillResult(){
  document.getElementById('drill-q').style.display='none';
  document.getElementById('drill-res').style.display='block';
  const total=drillOk+drillNg,pct=total>0?Math.round(drillOk/total*100):0;
  document.getElementById('dr-score').textContent=drillOk+'/'+total;
  document.getElementById('dr-sub').textContent=pct+'% chính xác';
}

function showDrillHome(){
  document.getElementById('drill-home').style.display='block';
  document.getElementById('drill-q').style.display='none';
  document.getElementById('drill-res').style.display='none';
  document.getElementById('flashcard-view').style.display='none';
  window.scrollTo(0,0);
  initDrillHome();
}

let fcPool=[], fcIdx=0;

function startFlashcardMode(){
  fcPool=[];
  LESSONS.forEach(l=>{
    if(!selectedLessons.has('all') && !selectedLessons.has(String(l.id))) return;
    l.grammars.forEach(g=>fcPool.push(g));
  });

  fcIdx=0;

  document.getElementById('flashcard-view').style.display='block';
  showFC();

function showFC(){
  if(fcIdx>=fcPool.length){showDrillHome();return;}
  const g=fcPool[fcIdx];
  document.getElementById('fc-pattern').innerHTML=g.pattern;
  document.getElementById('fc-struct').textContent=g.structure||'';
  document.getElementById('fc-meaning').textContent=g.meaning;
  document.getElementById('fc-struct-back').textContent=g.structure?'📐 '+g.structure:'';
  document.getElementById('fc-tip').textContent=g.tip?'💡 '+g.tip:'';

}

function flipCard(){document.getElementById('fc-scene').classList.toggle('flipped');}

function fcSkip(){fcIdx++;showFC();}

function fcMastered(){
  const g=fcPool[fcIdx];
  const nid=findNodeId(g.pattern);
  if(nid){masteredSet.add(nid);saveMastered();updateProgress();}
  fcIdx++;showFC();
}

function findNodeId(pattern){
  for(const l of LESSONS){
    for(let i=0;i<l.grammars.length;i++){
      if(l.grammars[i].pattern===pattern) return l.id+'-'+i;
    }
  }
  return null;
}

function renderExamGrid(){
  const grid=document.getElementById('exam-grid');
  if(!grid) return;
  grid.innerHTML='';
  let curYear='';
  GRAMMAR_EXAM_DATA.forEach(e=>{
    const hasData=curExamFilter==='m1'?(e.m1&&e.m1.length>0):
                  curExamFilter==='m2'?(e.m2&&e.m2.length>0):
                  (e.m3&&e.m3.qs&&e.m3.qs.length>0);
    if(!hasData) return;
    const yr=e.id.split('-')[1];
    if(yr!==curYear){
      curYear=yr;
      const sep=document.createElement('div');
      sep.className='year-sep';
      sep.textContent='── '+yr+' ──';
      grid.appendChild(sep);
    }
    const sc=EXAM_SCORES[e.id+'_'+curExamFilter];
    const cnt=curExamFilter==='m1'?e.m1.length:curExamFilter==='m2'?e.m2.length:e.m3.qs.length;
    const lbl=curExamFilter==='m1'?'問題1 · Điền ngữ pháp':curExamFilter==='m2'?'問題2 · Sắp xếp câu':'問題3 · Ngữ pháp đoạn văn';
    const btn=document.createElement('button');
    btn.className='exam-btn';
    btn.innerHTML=
      '<div class="exam-yr">📋 Đề '+e.label+'</div>'+
      '<div class="exam-cnt">'+cnt+' câu · '+lbl+'</div>'+
      '<div class="exam-sc" style="color:'+(sc!=null?'#16a34a':'#888')+'">'+
        (sc!=null?'✅ '+sc+'%':'Chưa làm')+
      '</div>';
    btn.onclick=()=>examStart(e.id);
    grid.appendChild(btn);
  });
  if(!grid.children.length){
    grid.innerHTML='<div style="text-align:center;padding:30px 20px;color:#94a3b8;font-size:.82rem">Chưa có dữ liệu cho loại đề này</div>';
  }
}

function examStart(id){
  examCur=GRAMMAR_EXAM_DATA.find(e=>e.id===id);
  if(!examCur) return;
  if(curExamFilter==='m1'){
    examPool=examCur.m1.map(q=>Object.assign({},q,{type:'m1'}));
  } else if(curExamFilter==='m2'){
    examPool=(examCur.m2||[]).map(q=>Object.assign({},q,{type:'m2'}));
  } else {
    const m3=examCur.m3||{title:'',text:'',qs:[]};
    examPool=m3.qs.map(q=>Object.assign({},q,{type:'m3',passTitle:m3.title,passText:m3.text}));
  }
  if(!examPool.length) return;
  examAnswers=new Array(examPool.length).fill(-1);
  examIdx=0;
  document.getElementById('exam-list').style.display='none';
  document.getElementById('exam-res').style.display='none';
  document.getElementById('exam-take').style.display='block';
  document.getElementById('eq-title').textContent='Đề '+examCur.label;
  window.scrollTo(0,0);
  showExamQ();
}

function showExamQ(){
  const q=examPool[examIdx];
  const total=examPool.length;
  document.getElementById('eq-prog').textContent=(examIdx+1)+'/'+total;

  // M3: show/update passage panel
  const passPanel=document.getElementById('m3-passage-panel');
  if(q.type==='m3'){
    passPanel.style.display='block';
    document.getElementById('m3-ptitle').textContent=q.passTitle||'文章';
    let html=(q.passText||'').replace(/\n/g,'<br>');
    for(let n=51;n<=55;n++){
      const cls='m3-bl'+(n===q.n?' cur':'');
      html=html.replace(new RegExp('\\['+n+'\\]','g'),'<span class="'+cls+'">['+n+']</span>');
    }
    document.getElementById('m3-ptext').innerHTML=html;
  } else {
    passPanel.style.display='none';
  }

  // Type label
  const numLabel=q.type==='m1'?'問題1 · Câu '+(examIdx+1):
                 q.type==='m2'?'問題2 · Câu '+(examIdx+1):
                 '問題3 · Blank ['+(q.n||examIdx+51)+']';
  document.getElementById('eq-num').textContent=numLabel;

  // Sentence / question display
  const sent=document.getElementById('eq-sent');
  if(q.type==='m1'){
    sent.innerHTML=q.q.replace('（　）','<span style="border-bottom:2.5px solid #2563eb;padding:0 8px;font-weight:800;letter-spacing:.04em;">　　　</span>');
  } else if(q.type==='m2'){
    const blanksHtml=['①','②','③','④'].map((num,i)=>{
      const isStar=(i===q.starPos);
      return '<span class="m2-blank'+(isStar?' star':'')+'">'+(isStar?'★':num)+'</span>';
    }).join('');
    sent.innerHTML=
      '<div class="m2-sent-wrap">'+
        '<div class="m2-pre-post">'+(q.pre||'')+'</div>'+
        '<div class="m2-blanks-row">'+blanksHtml+'</div>'+
        '<div class="m2-pre-post">'+(q.post||'')+'</div>'+
        '<div class="m2-hint">Chọn từ đặt vào vị trí ★ để câu có nghĩa đúng</div>'+
      '</div>';
  } else {
    sent.innerHTML='<div style="font-size:.82rem;color:#64748b;font-style:italic">Xem đoạn văn phía trên → Chọn từ phù hợp cho ô ['+q.n+']</div>';
  }

  // Options
  const opts=document.getElementById('eq-opts');
  opts.innerHTML='';
  (q.opts||[]).forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='eq-opt'+(examAnswers[examIdx]===i?' chosen':'');
    const pfx=q.type==='m1'?'<span style="font-size:.65rem;color:#94a3b8;margin-right:4px;">'+(i+1)+'</span>':
              ['①','②','③','④'][i]+' ';
    b.innerHTML=pfx+o;
    b.onclick=()=>examSelect(i);
    opts.appendChild(b);
  });

  const nxt=document.getElementById('eq-nxt');
  nxt.textContent=(examIdx===total-1)?'Câu cuối — Xem lại ✓':'次へ →';
  nxt.style.display='block';
}

function examSelect(chosenIdx){
  examAnswers[examIdx]=chosenIdx;
  document.querySelectorAll('.eq-opt').forEach((b,i)=>{
    b.classList.toggle('chosen',i===chosenIdx);
  });
}

function examNext(){
  if(examIdx<examPool.length-1){examIdx++;}
  else{examIdx=0;}
  showExamQ();
  window.scrollTo(0,0);
}

function examConfirmSubmit(){
  const answered=examAnswers.filter(a=>a!==-1).length;
  const skipped=examPool.length-answered;
  if(skipped>0){
    document.getElementById('modal-sub').textContent='Còn '+skipped+' câu chưa trả lời. Vẫn nộp bài?';
    document.getElementById('submit-modal').classList.add('show');
    return;
  }
  examShowResult();
}

function examShowResult(){
  document.getElementById('exam-take').style.display='none';
  document.getElementById('exam-res').style.display='block';
  document.getElementById('m3-passage-panel').style.display='none';
  window.scrollTo(0,0);

  let ok=0,ng=0;
  const history=[];
  examPool.forEach((q,i)=>{
    const chosen=examAnswers[i];
    const correct=(chosen===q.ans);
    if(chosen===-1||!correct){ng++;} else{ok++;}
    history.push({q,chosen,correct:chosen!==-1&&correct,
      chosenText:chosen===-1?'(bỏ qua)':(q.opts?q.opts[chosen]:''),
      correctText:q.opts?q.opts[q.ans]:''});
  });

  const total=examPool.length;
  const pct=Math.round(ok/total*100);
  EXAM_SCORES[examCur.id+'_'+curExamFilter]=pct; saveExamScores();

  const emoji=pct>=90?'🏆':pct>=70?'🌸':pct>=50?'📚':'💪';
  document.getElementById('eq-emoji').textContent=emoji;
  document.getElementById('eq-score').textContent=ok+'/'+total;
  document.getElementById('eq-pct').textContent=pct+'% chính xác';
  document.getElementById('eq-ok').textContent=ok;
  document.getElementById('eq-ng').textContent=ng;
  document.getElementById('eq-pct2').textContent=pct+'%';

  const rev=document.getElementById('eq-review');
  rev.innerHTML='';
  history.forEach((h,idx)=>{
    const skipped=(examAnswers[idx]===-1);
    const d=document.createElement('div');
    d.className='rv-item '+(h.correct?'ok':skipped?'skip':'ng');
    d.style.borderColor=h.correct?'#16a34a':skipped?'#888':'#dc2626';

    let qdisp='';
    if(h.q.type==='m1'){
      qdisp=h.q.q.replace('（　）','<span style="border-bottom:2px solid #2563eb;padding:0 4px;font-weight:800;">___</span>');
    } else if(h.q.type==='m2'){
      qdisp='<span style="font-size:.78rem;color:#64748b">'+(h.q.pre||'')+'【★】'+(h.q.post||'')+'</span>';
    } else {
      qdisp='<span style="font-size:.78rem;color:#64748b">['+h.q.n+'] trong đoạn văn「'+(h.q.passTitle||'')+'」</span>';
    }

    d.innerHTML=
      '<div class="rv-meta"><span class="rv-tag">Câu '+(idx+1)+'</span>'+
      '<span class="rv-status" style="color:'+(h.correct?'#16a34a':skipped?'#888':'#dc2626')+'">'+(h.correct?'✓ Đúng':skipped?'— Bỏ qua':'✗ Sai')+'</span></div>'+
      '<div class="rv-q">'+qdisp+'</div>'+
      (!h.correct&&!skipped?'<div class="rv-wrong">✗ Bạn chọn: '+h.chosenText+'</div>':'')+
      '<div class="rv-correct">✓ Đáp án: '+h.correctText+'</div>'+
      (h.q.exp?'<div class="rv-exp">💡 '+h.q.exp+'</div>':'');

    if(h.q.type==='m2'&&h.q.order){
      const orderStr=(h.q.order||[]).map((oi,pos)=>{
        const isStar=(pos===h.q.starPos);
        return (isStar?'<b style="color:#2563eb">':'')+'['+(['①','②','③','④'][pos]||pos+1)+'] '+(h.q.opts?.[oi]||'')+(isStar?'</b>':'');
      }).join(' → ');
      const extra=document.createElement('div');
      extra.className='rv-exp';
      extra.innerHTML='📐 Thứ tự đúng: '+orderStr;
      d.appendChild(extra);
    }
    rev.appendChild(d);
  });
}

// ── TTS GRAMMAR ──
function speakText(text, lang, rate) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang || 'ja-JP';
  u.rate = rate || 0.85;
  window.speechSynthesis.speak(u);
}

// Kiểm tra 1 ký tự có phải JP không
function isJapanese(ch) {
  const code = ch.charCodeAt(0);
  return (code >= 0x3000 && code <= 0x9FFF) || (code >= 0xFF00 && code <= 0xFFEF);
}

// Tách chuỗi hỗn hợp JP+VN thành mảng {text, lang}
function splitMixed(raw) {
  // Bỏ furigana <rt>...</rt>, giữ kanji
  let text = raw
    .replace(/<rt>[^<]*<\/rt>/g, '')
    .replace(/<[^>]+>/g, '')
    .replace(/[〜「」。、！？]/g, ' ')  // chỉ bỏ ký tự JP đặc biệt
    .replace(/\s+/g, ' ').trim();

  const parts = [];
  let cur = '';
  let curLang = null;

  for (const ch of text) {
    // Ranh giới tự nhiên: space, +, ＋, =, ;, :, →
    if (' ＋+'.includes(ch)) {
      if (cur.trim()) parts.push({ text: cur.trim(), lang: curLang || 'vi-VN' });
      cur = ''; curLang = null;
      continue;
    }
    // Dấu = ; : → là ranh giới, flush rồi reset
    if ('=;:→'.includes(ch)) {
      if (cur.trim()) parts.push({ text: cur.trim(), lang: curLang || 'vi-VN' });
      cur = ''; curLang = null;
      continue;
    }
    const jp = isJapanese(ch);
    const lang = jp ? 'ja-JP' : 'vi-VN';
    if (curLang === null) curLang = lang;
    if (lang !== curLang) {
      if (cur.trim()) parts.push({ text: cur.trim(), lang: curLang });
      cur = ch; curLang = lang;
    } else {
      cur += ch;
    }
  }
  if (cur.trim()) parts.push({ text: cur.trim(), lang: curLang || 'vi-VN' });

  // Gộp các phần liền kề cùng ngôn ngữ
  const merged = [];
  for (const p of parts) {
    if (p.text.trim().length === 0) continue;
    if (merged.length && merged[merged.length-1].lang === p.lang) {
      merged[merged.length-1].text += ' ' + p.text;
    } else {
      merged.push({...p});
    }
  }
  return merged.filter(p => p.text.trim().length > 0);
}

function readGrammarCard(g) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const queue = [];

  // 1. Pattern — tách JP/VN
  splitMixed(g.pattern).forEach(p => queue.push({ text: p.text, lang: p.lang, rate: 0.85 }));

  // 2. Structure — tách JP/VN
  if (g.structure) {
    splitMixed(g.structure).forEach(p => queue.push({ text: p.text, lang: p.lang, rate: 0.82 }));
  }

  // 3. Meaning — tách JP/VN
  splitMixed(g.meaning).forEach(p => queue.push({ text: p.text, lang: p.lang, rate: 0.9 }));

  // 4. Ví dụ: tách JP/VN từng câu
  if (g.examples) g.examples.forEach(ex => {
    splitMixed(ex.jp).forEach(p => queue.push({ text: p.text, lang: p.lang, rate: 0.8 }));
    splitMixed(ex.vn).forEach(p => queue.push({ text: p.text, lang: p.lang, rate: 0.9 }));
  });

  // 5. Tip — tách JP/VN
  if (g.tip) splitMixed(g.tip).forEach(p => queue.push({ text: p.text, lang: p.lang, rate: 0.9 }));

  let i = 0;
  function next() {
    if (i >= queue.length) return;
    const u = new SpeechSynthesisUtterance(queue[i].text);
    u.lang = queue[i].lang;
    u.rate = queue[i].rate;
    u.onend = () => { i++; setTimeout(next, 300); };
    window.speechSynthesis.speak(u);
  }
  next();
}
