<style>
:root{--bg:#fff8fb;--ink:#332b38;--muted:#7f7188;--sakura:#ff7faa;--sakura2:#ffe4ef;--lav:#bfa2db;--mint:#9be7c1;--mint2:#e9fff3;--red2:#fff0f1;--line:#ecdde8;--shadow:0 10px 28px rgba(160,86,128,.15)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100dvh;background:linear-gradient(180deg,#fff8fb,#fffaf0);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}#app{max-width:520px;margin:auto;padding:10px 10px 88px}.jp{font-family:"Yu Gothic","Meiryo","Noto Sans JP",system-ui,sans-serif;font-size:20px;font-weight:900;line-height:1.15}.top{position:sticky;top:0;z-index:20;background:rgba(255,248,251,.96);backdrop-filter:blur(10px);padding:6px 0 8px}.hero{background:linear-gradient(135deg,#fff,#ffe2ef 58%,#eee6ff);border:1.5px solid #ffd1e1;border-radius:22px;box-shadow:var(--shadow);padding:11px 12px;position:relative;overflow:hidden}.hero:after{content:"🌸";position:absolute;right:12px;top:4px;font-size:38px;opacity:.35}.title{display:flex;gap:8px;align-items:flex-start}.title .m{font-size:28px;line-height:1}h1{font-size:20px;margin:0;line-height:1.1}.sub{font-size:11px;color:var(--muted);margin-top:3px}.heroStats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:9px}.stat{background:rgba(255,255,255,.75);border:1px solid var(--line);border-radius:14px;padding:6px 4px;text-align:center}.stat b{display:block;font-size:16px}.stat span{font-size:9.5px;color:var(--muted);font-weight:800}.progress{height:8px;background:#fff;border:1px solid var(--line);border-radius:99px;overflow:hidden;margin-top:9px}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--sakura),var(--lav),var(--mint));width:0%}.notice{margin:8px 0;padding:9px 11px;border-radius:15px;background:#fff7dc;color:#685013;border:1px solid #ffe19a;font-size:12px;line-height:1.45;font-weight:750}.tabs{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(255,255,255,.98);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);max-width:520px;margin:auto;box-shadow:0 -10px 28px rgba(160,86,128,.13);padding-bottom:env(safe-area-inset-bottom)}.tabs button{border:0;background:transparent;padding:11px 2px 10px;color:#8b7182;font-weight:900;font-size:12px;font-family:inherit}.tabs button.active{background:#fff0f6;color:#f06c9a}.view{display:none}.view.on{display:block}.legend{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:7px;margin:8px 0 10px}.legend div{text-align:center;font-size:9.5px;color:var(--muted);font-weight:800}.legend .ico{display:block;font-size:21px;margin-bottom:1px}.garden{background:#fff;border:1.5px solid var(--line);border-radius:22px;padding:12px 8px 4px;box-shadow:var(--shadow)}.mapGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 7px}.stage{position:relative;min-height:120px;border-radius:18px;background:#fffafb;border:1.5px solid var(--line);text-align:center;padding:8px 4px 9px;cursor:pointer;overflow:hidden}.stage.current{border-color:var(--sakura);box-shadow:0 0 0 3px #ffe1ec}.stage.done{background:linear-gradient(180deg,#fff,#ecfff5)}.badge{position:absolute;top:5px;left:50%;transform:translateX(-50%);background:#ffa94d;color:#fff;border-radius:999px;padding:2px 7px;font-size:9px;font-weight:900;white-space:nowrap}.stage .name{font-size:12px;font-weight:950;margin-top:12px}.stage .range{font-size:9.8px;color:var(--muted);font-weight:800}.stage .theme{font-size:9.4px;color:#a55d7a;font-weight:900;min-height:24px;line-height:1.15;margin-top:2px}.stage .plant{font-size:38px;margin:5px 0 2px;line-height:1}.stage .state{font-size:10px;color:var(--muted);font-weight:900}.check{position:absolute;right:7px;bottom:7px;background:#42b77a;color:#fff;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:900}.grass{height:20px;margin:8px 0 10px;border-radius:14px;background:linear-gradient(180deg,#dff3c7,#aedb91);box-shadow:0 3px 0 #94c67b;position:relative}.grass:before{content:"🌼";position:absolute;left:12%;top:-10px;font-size:12px}.grass:after{content:"🐾";position:absolute;right:14%;top:-9px;font-size:11px;opacity:.7}.learnHeader{display:flex;align-items:center;gap:8px;margin:9px 0 8px}.learnHeader button{border:1.5px solid var(--line);background:#fff;color:var(--sakura);border-radius:13px;padding:8px 10px;font-weight:900;font-family:inherit}.learnHeader h2{font-size:16px;margin:0;flex:1}.controls{display:flex;gap:7px;overflow:auto;padding:3px 0 8px}.controls button{border:0;border-radius:999px;padding:9px 12px;font-weight:900;font-family:inherit;background:var(--sakura2);color:#784358;white-space:nowrap}.controls button.active{background:var(--sakura);color:#fff}.controls button:disabled{opacity:.35}.statusLine{background:#fff;border:1px solid var(--line);border-radius:15px;padding:9px 11px;margin-bottom:8px;display:flex;gap:8px;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:850}.sheetWrap{background:#fff;border:1.5px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:18px}.sheetHeader,.sheetRow{display:grid;grid-template-columns:var(--cols,1fr 1fr .55fr)}.sheetHeader{background:#ffecf4;color:#6e4658;font-size:11px;font-weight:950}.cell{min-height:69px;padding:9px 6px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;gap:3px;overflow:hidden}.cell:last-child{border-right:0}.sheetRow:nth-child(odd){background:#fffafd}.yomi{font-size:12px;color:var(--muted);font-weight:700}.vn{font-size:15.5px;font-weight:820;line-height:1.25}.meta{font-size:10.5px;color:var(--muted);font-weight:760}.hidden{background:repeating-linear-gradient(45deg,#fff,#fff 8px,#fff1f7 8px,#fff1f7 16px);color:#a28d9b;text-align:center;font-weight:950;align-items:center}.ans{margin:4px;border:1.3px dashed #dfc6d5;border-radius:12px;background:#fff9fc;color:#7f6676;min-height:58px;text-align:center;align-items:center}.clickable{cursor:pointer}.ok{background:var(--mint2)!important}.ng{background:var(--red2)!important}.audio{font-size:11px;color:var(--sakura);font-weight:950}.footerActions{position:sticky;bottom:58px;z-index:30;background:linear-gradient(transparent,rgba(255,248,251,.95) 25%,rgba(255,248,251,.98));padding:20px 0 8px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.footerActions button{border:0;border-radius:17px;padding:13px 8px;font-weight:950;font-family:inherit;font-size:15px}.footerActions .primary{background:var(--sakura);color:#fff}.footerActions .ghost{background:#fff;color:var(--sakura);border:1.5px solid var(--sakura2)}.footerActions.single{grid-template-columns:1fr}.modal{position:fixed;inset:0;display:none;align-items:end;z-index:80;background:rgba(50,32,44,.35)}.modal.show{display:flex}.modalSheet{width:100%;max-width:520px;margin:auto;background:#fff;border-radius:26px 26px 0 0;padding:16px 14px 22px;box-shadow:0 -18px 45px rgba(0,0,0,.18)}.modalSheet .q{font-size:22px;font-weight:950;margin:5px 0 4px}.hint{font-size:12px;color:var(--muted);font-weight:800}.choices{display:grid;gap:10px;margin:14px 0}.choice{width:100%;text-align:left;border:1.5px solid var(--line);border-radius:18px;background:#fff8fb;padding:13px 14px;font-size:18px;font-weight:900;font-family:inherit;color:var(--ink)}.close{width:100%;border:0;border-radius:16px;background:#f0e8ee;color:#7c6576;padding:12px;font-weight:900;font-family:inherit}.card{background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:14px;margin:9px 0;box-shadow:var(--shadow)}.card h3{margin:0 0 6px;font-size:17px}.card p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}.reset{width:100%;border:1.5px solid var(--sakura2);background:#fff;color:var(--sakura);border-radius:16px;padding:12px;font-weight:900;font-family:inherit;margin-top:12px}

<script>
const BATCH=100,PASS=70,STORE='n3-fast-renshu-v5';let ITEMS=[],TOTAL=0,STAGE_INFO=[],CHOICES=[],state=loadState(),activeStage=state.currentStage||0,mode='lv0',resultMode=false,pickContext=null;state.answers||={};state.stageDone||={};state.mistakes||={};
const THEMES=[{id:'work',name:'Công việc / thời gian',keys:'仕事 会社 社員 働 面接 残業 給料 締切 締め切り 遅刻 予定 予約 時間 間に合う công việc công ty lương tăng ca phỏng vấn hạn chót deadline trễ giờ kịp giờ đặt lịch lịch hẹn'},{id:'school',name:'Học tập / thi cử',keys:'学校 学生 勉強 試験 宿題 教室 授業 先生 質問 答え 説明 練習 合格 học bài thi kiểm tra giáo viên lớp giải thích luyện tập đỗ đạt'},{id:'daily',name:'Sinh hoạt / nhà cửa',keys:'家 部屋 台所 料理 掃除 洗濯 家族 生活 引っ越す 住む 寝る 起きる nhà phòng bếp nấu ăn dọn dẹp giặt giũ gia đình sinh hoạt chuyển nhà sống ngủ dậy'},{id:'travel',name:'Di chuyển / du lịch',keys:'旅行 電車 駅 道 空港 飛行機 バス 自転車 車 運転 交通 渋滞 地図 乗る 降りる du lịch tàu điện ga đường sân bay máy bay xe buýt xe đạp xe hơi lái giao thông kẹt xe bản đồ lên xe xuống xe'},{id:'shop',name:'Mua sắm / tiền bạc',keys:'買う 売る 店 値段 料金 お金 銀行 払う 安い 高い 商品 注文 服 靴 mua bán cửa hàng giá phí tiền ngân hàng trả rẻ đắt hàng hóa đặt món quần áo giày'},{id:'health',name:'Sức khỏe / cơ thể',keys:'病院 医者 薬 病気 体 頭 手 足 目 耳 熱 痛い 疲れる 元気 健康 bệnh viện bác sĩ thuốc bệnh cơ thể đầu tay chân mắt tai sốt đau mệt khỏe sức khỏe'},{id:'people',name:'Con người / cảm xúc',keys:'人 友達 彼 彼女 親切 心配 遠慮 迷惑 怒る 笑う 泣く 気持ち 好き 嫌い người bạn tử tế lo lắng ngại khách sáo phiền giận cười khóc cảm xúc thích ghét'},{id:'comm',name:'Giao tiếp / nhờ vả',keys:'話す 聞く 言う 伝える 相談 連絡 電話 メール 頼む 断る 約束 意見 会話 nói nghe bảo truyền đạt tư vấn liên lạc điện thoại mail nhờ từ chối hứa ý kiến hội thoại'},{id:'nature',name:'Thời tiết / môi trường',keys:'天気 雨 雪 風 暑い 寒い 春 夏 秋 冬 自然 海 山 川 花 空 thời tiết mưa tuyết gió nóng lạnh thiên nhiên biển núi sông hoa trời'},{id:'change',name:'Thay đổi / nguyên nhân',keys:'変わる 増える 減る 始まる 終わる 続く 原因 理由 結果 せい おかげ ため ので から thay đổi tăng giảm bắt đầu kết thúc tiếp tục nguyên nhân lý do kết quả do nhờ vì'},{id:'ability',name:'Khả năng / quyết định',keys:'できる 可能 無理 決める 決定 予定 つもり ようになる ことにする はず 違いない có thể khả năng không thể quyết định dự định trở nên chắc là chắc chắn'},{id:'compare',name:'So sánh / mức độ',keys:'同じ 違う 比べる 一番 もっと ほど くらい だけ ばかり しか 以上 以下 giống khác so sánh nhất hơn mức độ khoảng chỉ'},{id:'exam',name:'Đề thi / từ dễ lẫn',keys:'意味 正しい 選ぶ 文 問題 文章 読む 書く 答え 説明 ví dụ câu hỏi đáp án chọn đúng nghĩa văn đoạn giải thích'}];
const PLAN=['work','school','daily','travel','shop','health','people','comm','nature','change','ability','compare','exam','work','daily','travel','people','comm','exam'],QUOTA={vocab:47,kanji:16,grammar:7,exam:30};
function N(s){return String(s??'').normalize('NFC').trim()}function loadState(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){return{}}}function save(){state.currentStage=activeStage;try{localStorage.setItem(STORE,JSON.stringify(state))}catch(e){}}function esc(s){return N(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function jsArg(s){return N(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}function hasJP(s){return /[一-龯ぁ-んァ-ン々〆〤]/.test(N(s))}function strip(s){return N(s).replace(/<[^>]+>/g,'').replace(/\s+/g,' ')}
function grabConst(html,name){let i=html.indexOf('const '+name);if(i<0)return null;let eq=html.indexOf('=',i),j=eq+1;while(/\s/.test(html[j]))j++;let o=html[j],c=o==='['?']':'}',d=0,q=null,e=false;for(let k=j;k<html.length;k++){let ch=html[k];if(q){if(e)e=false;else if(ch==='\\')e=true;else if(ch===q)q=null;continue}if(ch==='"'||ch==="'"||ch==='`'){q=ch;continue}if(ch===o)d++;else if(ch===c){d--;if(d===0)return html.slice(j,k+1)}}return null}function evalConst(html,name){const lit=grabConst(html,name);return lit?Function('return '+lit)():[]}
function examTerm(q,type){let t=N(q.word||q.term||'');if(!t&&q.q){let m=String(q.q).match(/<b>(.*?)<\/b>/);if(m)t=strip(m[1])}if(!t&&type==='m3'&&q.opts&&q.ans!=null)t=N(q.opts[q.ans]);return hasJP(t)?t:''}
function themeScore(it,theme){const text=N(`${it.term} ${it.reading} ${it.meaning} ${it.tags}`).toLowerCase();let sc=0;theme.keys.split(/\s+/).forEach(k=>{if(k&&text.includes(k.toLowerCase()))sc++});if(it.type==='kanji')theme.keys.split(/\s+/).forEach(k=>{if(k&&String(k).includes(it.term))sc+=2});return sc}function bestThemeId(it){let best='exam',bs=-1;THEMES.forEach(t=>{let s=themeScore(it,t);if(s>bs){bs=s;best=t.id}});return bs>0?best:'exam'}function take(pool,theme,n){pool.sort((a,b)=>themeScore(b,theme)-themeScore(a,theme)||a.sourceIndex-b.sourceIndex);let r=[];while(pool.length&&r.length<n)r.push(pool.shift());return r}function interleave(p){let order=['vocab','vocab','kanji','exam','vocab','grammar','vocab','exam','kanji','exam'],out=[],m=true;while(m){m=false;for(const k of order)if(p[k]&&p[k].length){out.push(p[k].shift());m=true}}return out}
function buildPath(groups){const pools={vocab:[...groups.vocab],kanji:[...groups.kanji],grammar:[...groups.grammar],exam:[...groups.exam]},all=Object.values(pools).flat(),n=Math.ceil(all.length/BATCH),stages=[];all.forEach(it=>it.theme=bestThemeId(it));for(let s=0;s<n;s++){const theme=THEMES.find(t=>t.id===PLAN[s%PLAN.length])||THEMES[0];let p={vocab:take(pools.vocab,theme,QUOTA.vocab),kanji:take(pools.kanji,theme,QUOTA.kanji),grammar:take(pools.grammar,theme,QUOTA.grammar),exam:take(pools.exam,theme,QUOTA.exam)},stage=interleave(p);while(stage.length<BATCH){let k=['vocab','exam','kanji','grammar'].find(x=>pools[x].length);if(!k)break;stage.push(pools[k].shift())}stages.push({theme:theme.name,items:stage})}let flat=[];stages.forEach((st,i)=>st.items.forEach(it=>{it.stage=i;flat.push(it)}));STAGE_INFO=stages.map((st,i)=>({theme:st.theme,count:st.items.length,from:i*BATCH+1,to:i*BATCH+st.items.length}));return flat}
async function loadData(){try{const [vh,kh,hh]=await Promise.all(['vocab.html','kanji.html','hoc-nhanh.html'].map(u=>fetch(u,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(u);return r.text()})));let source=1,g={vocab:[],kanji:[],grammar:[],exam:[]};evalConst(vh,'VOCAB_DB').forEach(x=>g.vocab.push({id:'v'+source,sourceIndex:source++,type:'vocab',kind:'Từ vựng',term:N(x.kanji||x.word),reading:N(x.kana),meaning:N(x.vn||x.meaning),tags:N(`Bài ${x.lesson||''} · Ngày ${x.day||''} · ${x.type||''}`)}));evalConst(kh,'KANJI_DB').forEach(x=>g.kanji.push({id:'k'+source,sourceIndex:source++,type:'kanji',kind:'Kanji',term:N(x.k||x.word),reading:N((x.on&&x.on.read)||(x.kun&&x.kun.read)),meaning:N(x.vn||x.meaning),tags:N(x.hv||x.group)}));evalConst(hh,'GRAMMAR').forEach(x=>g.grammar.push({id:'g'+source,sourceIndex:source++,type:'grammar',kind:'Ngữ pháp',term:N(x.p||x.pattern),reading:'',meaning:N(x.v||x.meaning),tags:N(x.t)}));let ex=[];evalConst(vh,'EXAM_VOCAB_DATA').forEach(set=>['m3','m4','m5'].forEach(m=>(set[m]||[]).forEach(q=>{let term=examTerm(q,m),meaning=N(q.exp||q.meaning||strip(q.q)||'');if(term&&meaning)ex.push({id:'e'+source,sourceIndex:source++,type:'exam',kind:'Từ đề thi',term,reading:'',meaning,tags:N((set.label||'')+' · '+m)})})));g.exam=ex.slice(0,550);Object.keys(g).forEach(k=>g[k]=g[k].filter(x=>x.term&&x.meaning));ITEMS=buildPath(g);TOTAL=ITEMS.length;document.getElementById('loadNotice').textContent=`Đã tải ${TOTAL} mục. Bấm trực tiếp một chặng để học; mọi chặng đều mở được.`;renderAll()}catch(e){document.getElementById('loadNotice').innerHTML='<div class="notice">Không tải được dữ liệu. Hãy mở trang này từ GitHub Pages.</div>';console.error(e)}}
function stageItems(i){return ITEMS.slice(i*BATCH,Math.min((i+1)*BATCH,TOTAL))}function ans(id){state.answers[id]||={lv0:false,lv1:null,lv2:null,lv3:null};return state.answers[id]}function target(lv,it){return lv==='lv2'?it.meaning:it.term}function score(stage,lv){let its=stageItems(stage),ok=0;its.forEach(it=>{if(ans(it.id)[lv]===target(lv,it))ok++});return{ok,total:its.length,pct:its.length?Math.round(ok/its.length*100):0}}function stageLevel(i){let its=stageItems(i);if(!its.length)return 0;if(score(i,'lv3').pct>=PASS)return 4;if(score(i,'lv2').pct>=PASS)return 3;if(score(i,'lv1').pct>=PASS)return 2;if(its.some(it=>ans(it.id).lv0||ans(it.id).lv1||ans(it.id).lv2||ans(it.id).lv3))return 1;return 0}function currentStage(){let n=Math.ceil(TOTAL/BATCH);for(let i=0;i<n;i++)if(stageLevel(i)<4)return i;return Math.max(0,n-1)}const icons=['🌰','🌱','🌿','🌷','🌸'],names=['Hạt','Mầm','Cây','Nụ','Hoa'];
function renderAll(){renderHero();renderMap();renderLearn();renderStats();renderMistakes();save()}function renderHero(){let n=Math.ceil(TOTAL/BATCH)||1,done=Array.from({length:n},(_,i)=>stageLevel(i)>=4?stageItems(i).length:0).reduce((a,b)=>a+b,0),cur=currentStage();document.getElementById('totalItems').textContent=TOTAL||'...';document.getElementById('currentStage').textContent=String(cur+1).padStart(2,'0');document.getElementById('doneItems').textContent=done;document.getElementById('heroProgress').style.width=(TOTAL?done/TOTAL*100:0)+'%'}
function renderMap(){let grid=document.getElementById('mapGrid');grid.innerHTML='';let n=Math.ceil(TOTAL/BATCH),cur=currentStage();for(let i=0;i<n;i++){let lv=stageLevel(i),from=i*BATCH+1,to=Math.min((i+1)*BATCH,TOTAL),info=STAGE_INFO[i]||{},el=document.createElement('div');el.className='stage '+(lv>=4?'done ':'')+(i===cur?'current ':'');el.innerHTML=`${i===cur?'<div class="badge">Đang học</div>':''}<div class="name">Chặng ${String(i+1).padStart(2,'0')}</div><div class="range">${String(from).padStart(3,'0')}–${String(to).padStart(3,'0')}</div><div class="theme">${esc(info.theme||'Tổng hợp')}</div><div class="plant">${icons[lv]}</div><div class="state">${names[lv]}</div>${lv>=4?'<div class="check">✓</div>':''}`;el.onclick=()=>openStage(i);grid.appendChild(el)}}function nextMode(i){let lv=stageLevel(i);return lv===0?'lv0':lv===1?'lv1':lv===2?'lv2':lv===3?'lv3':'lv0'}function openStage(i){activeStage=i;mode=nextMode(i);resultMode=false;showLearn()}
function showTab(tab){document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));if(tab==='map'){document.getElementById('mapView').classList.add('on');document.querySelectorAll('.tabs button')[0].classList.add('active');renderMap()}if(tab==='mistake'){document.getElementById('mistakeView').classList.add('on');document.querySelectorAll('.tabs button')[1].classList.add('active');renderMistakes()}if(tab==='stats'){document.getElementById('statsView').classList.add('on');document.querySelectorAll('.tabs button')[2].classList.add('active');renderStats()}window.scrollTo(0,0)}function showLearn(){document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));document.getElementById('learnView').classList.add('on');renderLearn();window.scrollTo(0,0)}
function speak(txt){txt=N(txt).replace(/[A-Za-zÀ-ỹ0-9]+/g,'').replace(/[〜]/g,'').trim();if(!txt)return;try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(txt);u.lang='ja-JP';u.rate=.88;speechSynthesis.speak(u)}catch(e){}}function jpCell(it){return `<div class="cell clickable" onclick="speak('${jsArg((it.term||'')+' '+(it.reading||''))}')"><div class="jp">${esc(it.term)}</div>${it.reading?`<div class="yomi">${esc(it.reading)}</div>`:''}<div class="audio">🔊 Nhật</div></div>`}function setHeader(cols){let h=document.getElementById('sheetHeader');h.style.setProperty('--cols',cols.map(c=>c.w).join(' '));h.innerHTML=cols.map(c=>`<div class="cell">${c.t}</div>`).join('')}
function renderLearn(){if(!TOTAL)return;let its=stageItems(activeStage),from=activeStage*BATCH+1,to=Math.min((activeStage+1)*BATCH,TOTAL),info=STAGE_INFO[activeStage]||{};document.getElementById('learnTitle').textContent=`Chặng ${String(activeStage+1).padStart(2,'0')} · ${info.theme||'Tổng hợp'}`;['lv0','lv1','lv2','lv3'].forEach(x=>document.getElementById('btn'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active',mode===x));document.getElementById('btnResult').disabled=mode==='lv0';document.getElementById('btnLv2').disabled=score(activeStage,'lv1').pct<PASS;document.getElementById('btnLv3').disabled=score(activeStage,'lv2').pct<PASS;document.getElementById('modeText').textContent=`Mục ${from}–${to} · ${mode.toUpperCase()}`+(resultMode?' · Kết quả':'');document.getElementById('scoreText').textContent=mode==='lv0'?'LV0 không cần điểm':`${score(activeStage,mode).pct}%`;let cols=[],html='';if(mode==='lv0'){cols=[{t:'C1 · Từ / Kanji / Ngữ pháp',w:'1.05fr'},{t:'C2 · Nghĩa',w:'1.05fr'},{t:'C3 · LV1',w:'.55fr'}];document.getElementById('noticeLearn').textContent='LV0: đọc cột 1 + cột 2. Bấm chữ Nhật để nghe. Xong thì bấm Đọc xong → LV1.';html=its.map(it=>`<div class="sheetRow" style="--cols:${cols.map(c=>c.w).join(' ')}">${jpCell(it)}<div class="cell"><div class="vn">${esc(it.meaning)}</div><div class="meta">${esc(it.kind)} · ${esc(it.tags)}</div></div><div class="cell ans">trống</div></div>`).join('');document.getElementById('learnActions').className='footerActions single';document.getElementById('learnActions').innerHTML='<button class="primary" onclick="finishLv0()">Đọc xong → LV1</button>'}if(mode==='lv1'){cols=[{t:resultMode?'C1 · Đáp án gốc':'C1 · Ẩn',w:resultMode?'1fr':'.42fr'},{t:'C2 · Nghĩa',w:'1.18fr'},{t:'C3 · Bạn chọn',w:'.95fr'}];document.getElementById('noticeLearn').textContent=resultMode?'Kết quả LV1: cột 1 hiện lại để so sánh, cột 3 giữ đáp án bạn chọn.':'LV1: ẩn cột 1. Bấm nghĩa ở cột 2 để chọn từ đúng.';html=its.map(it=>{let a=ans(it.id).lv1,cls=resultMode&&a?(a===it.term?' ok':' ng'):'';return `<div class="sheetRow" style="--cols:${cols.map(c=>c.w).join(' ')}">${resultMode?jpCell(it):'<div class="cell hidden">Ẩn C1</div>'}<div class="cell clickable" onclick="pick('${jsArg(it.id)}','lv1')"><div class="vn">${esc(it.meaning)}</div><div class="meta">chạm để chọn từ</div></div><div class="cell ans${cls}"><div class="jp">${esc(a||'')}</div></div></div>`}).join('');document.getElementById('learnActions').className='footerActions';document.getElementById('learnActions').innerHTML='<button class="ghost" onclick="showResult()">Xem kết quả</button><button class="primary" onclick="goMode(\'lv2\')">Qua LV2</button>'}if(mode==='lv2'){cols=[{t:resultMode?'C2 · Đáp án gốc':'C2 · Ẩn',w:resultMode?'1fr':'.42fr'},{t:'C3 · Từ đúng',w:'1.1fr'},{t:'C4 · Bạn chọn',w:'1.05fr'}];document.getElementById('noticeLearn').textContent=resultMode?'Kết quả LV2: cột 2 hiện lại để so sánh, cột 4 giữ đáp án bạn chọn.':'LV2: cột 3 đã tự fill từ đúng. Bấm cột 3 để chọn nghĩa đúng.';html=its.map(it=>{let a=ans(it.id).lv2,cls=resultMode&&a?(a===it.meaning?' ok':' ng'):'';return `<div class="sheetRow" style="--cols:${cols.map(c=>c.w).join(' ')}">${resultMode?`<div class="cell"><div class="vn">${esc(it.meaning)}</div></div>`:'<div class="cell hidden">Ẩn C2</div>'}<div class="cell clickable" onclick="pick('${jsArg(it.id)}','lv2')"><div class="jp">${esc(it.term)}</div>${it.reading?`<div class="yomi">${esc(it.reading)}</div>`:''}<div class="audio">🔊 Nhật</div></div><div class="cell ans${cls}"><div class="vn">${esc(a||'')}</div></div></div>`}).join('');document.getElementById('learnActions').className='footerActions';document.getElementById('learnActions').innerHTML='<button class="ghost" onclick="showResult()">Xem kết quả</button><button class="primary" onclick="goMode(\'lv3\')">Qua LV3</button>'}if(mode==='lv3'){cols=[{t:resultMode?'C3 · Đáp án gốc':'C3 · Ẩn',w:resultMode?'1fr':'.42fr'},{t:'C4 · Nghĩa đúng',w:'1.18fr'},{t:'C5 · Bạn chọn',w:'1.02fr'}];document.getElementById('noticeLearn').textContent=resultMode?'Kết quả LV3: cột 3 hiện lại để so sánh. Pass LV3 thì chặng thành hoa.':'LV3: cột 4 đã tự fill nghĩa đúng. Bấm cột 4 để chọn từ đúng.';html=its.map(it=>{let a=ans(it.id).lv3,cls=resultMode&&a?(a===it.term?' ok':' ng'):'';return `<div class="sheetRow" style="--cols:${cols.map(c=>c.w).join(' ')}">${resultMode?jpCell(it):'<div class="cell hidden">Ẩn C3</div>'}<div class="cell clickable" onclick="pick('${jsArg(it.id)}','lv3')"><div class="vn">${esc(it.meaning)}</div></div><div class="cell ans${cls}"><div class="jp">${esc(a||'')}</div></div></div>`}).join('');document.getElementById('learnActions').className='footerActions';document.getElementById('learnActions').innerHTML='<button class="ghost" onclick="showResult()">Xem kết quả</button><button class="primary" onclick="completeStage()">Hoàn thành chặng</button>'}setHeader(cols);document.getElementById('sheetRows').innerHTML=html;renderHero();renderStats();save()}
function finishLv0(){stageItems(activeStage).forEach(it=>ans(it.id).lv0=true);mode='lv1';resultMode=false;renderLearn();renderMap()}function goMode(m){if(m==='lv0'){mode=m;resultMode=false;renderLearn();return}if(m==='lv1'){if(!stageItems(activeStage).some(it=>ans(it.id).lv0))finishLv0();else{mode='lv1';resultMode=false;renderLearn()}return}if(m==='lv2'){let s=score(activeStage,'lv1');if(s.pct<PASS){alert(`LV1 chưa đạt ${PASS}% (${s.pct}%).`);return}stageItems(activeStage).forEach(it=>ans(it.id).lv1=it.term);mode='lv2';resultMode=false;renderLearn();renderMap();return}if(m==='lv3'){let s=score(activeStage,'lv2');if(s.pct<PASS){alert(`LV2 chưa đạt ${PASS}% (${s.pct}%).`);return}stageItems(activeStage).forEach(it=>ans(it.id).lv2=it.meaning);mode='lv3';resultMode=false;renderLearn();renderMap();return}}function showResult(){if(mode==='lv0')return;resultMode=true;let s=score(activeStage,mode);renderLearn();renderMap();setTimeout(()=>alert(`${mode.toUpperCase()}: ${s.ok}/${s.total} = ${s.pct}%\n${s.pct>=PASS?'Đạt pass.':'Chưa đạt, làm lại level này.'}`),50)}function completeStage(){let s=score(activeStage,'lv3');if(s.pct<PASS){alert(`LV3 chưa đạt ${PASS}% (${s.pct}%).`);return}state.stageDone[activeStage]=true;if(activeStage<Math.ceil(TOTAL/BATCH)-1)activeStage++;mode=nextMode(activeStage);resultMode=false;renderAll();showTab('map')}
function choicesFor(it,lv){let field=lv==='lv2'?'meaning':'term',correct=target(lv,it),pool=[...stageItems(activeStage),...ITEMS].filter(x=>x.id!==it.id&&x.kind===it.kind).map(x=>x[field]).filter(Boolean);pool=[...new Set(pool)];return [correct,...pool.sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5)}function pick(id,lv){let it=ITEMS.find(x=>x.id===id);pickContext={id,lv};CHOICES=choicesFor(it,lv);document.getElementById('modalType').textContent=lv.toUpperCase();document.getElementById('modalQ').textContent=lv==='lv2'?it.term:it.meaning;document.getElementById('modalSub').textContent=lv==='lv2'?'Chọn nghĩa đúng':'Chọn từ / kanji / mẫu ngữ pháp đúng';document.getElementById('choices').innerHTML=CHOICES.map((c,i)=>`<button class="choice" onclick="choose(${i})">${esc(c)}</button>`).join('');document.getElementById('modal').classList.add('show');if(lv==='lv2')speak(it.term+' '+it.reading)}function choose(i){let v=CHOICES[i],{id,lv}=pickContext,it=ITEMS.find(x=>x.id===id);ans(id)[lv]=v;if(v!==target(lv,it))state.mistakes[id]=(state.mistakes[id]||0)+1;closeModal();renderLearn();renderMap()}function closeModal(){document.getElementById('modal').classList.remove('show')}
function renderMistakes(){let ids=Object.keys(state.mistakes||{});document.getElementById('mistakeText').innerHTML=ids.length?`Có <b>${ids.length}</b> mục sai. Bấm 🔊 để nghe lại tiếng Nhật.`:'Chưa có lỗi.';document.getElementById('mistakeList').innerHTML=ids.slice(0,120).map(id=>{let it=ITEMS.find(x=>x.id==id);return it?`<div class="card"><h3>${esc(it.term)} <button onclick="speak('${jsArg((it.term||'')+' '+(it.reading||''))}')">🔊</button></h3><p>${esc(it.reading)} · ${esc(it.meaning)} · ${esc(it.kind)} · sai ${state.mistakes[id]} lần</p></div>`:''}).join('')}function renderStats(){let n=Math.ceil(TOTAL/BATCH)||1,doneStages=Array.from({length:n},(_,i)=>stageLevel(i)>=4).filter(Boolean).length,doneCount=Array.from({length:n},(_,i)=>stageLevel(i)>=4?stageItems(i).length:0).reduce((a,b)=>a+b,0);document.getElementById('statsText').innerHTML=`Đã hoàn thành <b>${doneStages}/${n}</b> chặng · <b>${doneCount}/${TOTAL||0}</b> mục. Chặng hiện tại: <b>${String(currentStage()+1).padStart(2,'0')}</b>. Mọi chặng đều mở bằng cách bấm trực tiếp trên map.`}function resetProgress(){if(confirm('Reset toàn bộ tiến độ Fast Renshu?')){localStorage.removeItem(STORE);state=loadState();state.answers={};state.stageDone={};state.mistakes={};activeStage=0;mode='lv0';resultMode=false;renderAll();showTab('map')}}
loadData();
