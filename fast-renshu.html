<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ff8fb3">
<title>Fast Renshu</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;background:#fff8fb;color:#332b38;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding:24px;text-align:center}.box{max-width:420px;background:#fff;border:1.5px solid #ffd1e1;border-radius:24px;padding:24px;box-shadow:0 10px 28px rgba(160,86,128,.15)}h1{margin:0 0 8px;font-size:24px}.sub{font-size:13px;color:#7f7188;line-height:1.6}.err{color:#9b263a;font-weight:800}
</style>
</head>
<body>
<div class="box"><h1>🐰🌸 Fast Renshu</h1><div class="sub" id="msg">Đang mở bản đã sửa âm thanh...</div></div>
<script>
(async()=>{
  const core='https://raw.githubusercontent.com/ngocbabby/n3-jlpt-app/d571f8404a5168b91715e4b6b7efd4b8f829f747/fast-renshu.html';
  try{
    let html=await fetch(core,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('load');return r.text()});
    const oldSpeak="function speak(txt){txt=N(txt).replace(/[A-Za-zÀ-ỹ0-9]+/g,'').replace(/[〜]/g,'').trim();if(!txt)return;try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(txt);u.lang='ja-JP';u.rate=.88;speechSynthesis.speak(u)}catch(e){}}";
    const newSpeak="function speak(txt){txt=N(txt);let kana=txt.match(/([ぁ-んァ-ンー]+)\\s*$/);txt=kana?kana[1]:txt.replace(/[A-Za-zÀ-ỹ0-9]+/g,'').replace(/[〜]/g,'').trim();if(!txt)return;try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(txt);u.lang='ja-JP';u.rate=.88;speechSynthesis.speak(u)}catch(e){}}";
    html=html.replace(oldSpeak,newSpeak);
    html=html.replace('Bấm chặng để học · Excel 5 cột','Bấm chặng để học · âm thanh đọc 1 lần');
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('msg').innerHTML='<span class="err">Không mở được Fast Renshu.</span><br>Hãy tải lại trang hoặc kiểm tra mạng.';
  }
})();
</script>
</body>
</html>
