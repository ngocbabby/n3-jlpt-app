<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Kanji N3 — Học nhanh thi ngay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=DM+Sans:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');
:root{
  --ink:#0f0e17;--paper:#fffffe;--dim:#eeebe4;--card:#faf8f4;
  --a:#e85d04;--a2:#ffddd2;
  --g:#2d6a4f;--gl:#d8f3dc;
  --r:#c1121f;--rl:#ffe5e5;
  --b:#023e8a;--bl:#e0f0ff;
  --muted:#9e9789;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding-bottom:68px;}

/* NAV */
nav{display:flex;border-bottom:2.5px solid var(--ink);position:sticky;top:0;z-index:99;background:var(--paper);}
.nav-logo{padding:12px 16px;border-right:2.5px solid var(--ink);font-family:'Noto Serif JP',serif;font-size:1.2rem;font-weight:900;line-height:1;display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.nav-logo span{color:var(--a);font-size:.55rem;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
.nav-tabs{display:flex;flex:1;overflow:hidden;}
.ntab{flex:1;border:none;border-right:1.5px solid var(--dim);background:var(--paper);font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:700;cursor:pointer;color:var(--muted);transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 4px;}
.ntab:last-child{border-right:none;}
.ntab .ic{font-size:1rem;}
.ntab.on{background:var(--ink);color:var(--paper);}

/* FILTER */
.frow{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:1.5px solid var(--dim);-webkit-overflow-scrolling:touch;}
.frow::-webkit-scrollbar{display:none;}
.chip{padding:4px 12px;border-radius:20px;border:1.5px solid var(--dim);background:var(--paper);font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--muted);transition:all .15s;}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.chip.hot{border-color:var(--a);color:var(--a);}
.chip.hot.on{background:var(--a);color:#fff;}

/* PAGE */
.pg{display:none;}
.pg.on{display:block;}

/* ═══ SCAN ═══ */
.scan-bar{padding:7px 14px;display:flex;align-items:center;border-bottom:1px solid var(--dim);}
.scan-info{font-size:.7rem;font-weight:600;color:var(--muted);}
.scan-num{margin-left:auto;font-family:'Space Mono',monospace;font-size:.68rem;background:var(--dim);border-radius:20px;padding:2px 9px;}
.prog{height:3px;background:var(--dim);}
.pf{height:100%;background:var(--a);transition:width .4s;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;border-bottom:2.5px solid var(--ink);}
.kc{border-bottom:1.5px solid var(--dim);border-right:1.5px solid var(--dim);padding:10px 10px 8px;cursor:pointer;position:relative;transition:background .12s;-webkit-tap-highlight-color:transparent;overflow:hidden;}
.kc:nth-child(2n){border-right:none;}
.kc:active{background:var(--a2);}
.kc.done{background:var(--gl);}
.ktop{display:flex;justify-content:space-between;margin-bottom:5px;}
.kidx{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--muted);}
.khot{font-size:.52rem;font-weight:800;color:var(--a);background:var(--a2);border-radius:3px;padding:1px 4px;}
.kk{font-family:'Noto Serif JP',serif;font-size:1.9rem;font-weight:700;line-height:1;margin-bottom:4px;color:var(--ink);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.khv{font-size:.55rem;font-weight:800;letter-spacing:.1em;color:var(--a);margin-bottom:2px;}.khv:empty{display:none;margin:0;}
.kvn{font-size:.68rem;font-weight:700;color:var(--ink);margin-bottom:5px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kwords{display:flex;flex-direction:column;gap:3px;}
.kw{display:flex;align-items:baseline;gap:4px;padding:3px 6px;border-radius:5px;overflow:hidden;}
.kw.on{background:var(--bl);}
.kw.kun{background:var(--gl);}.kw.note{background:var(--dim);padding:3px 6px;border-radius:5px;}
.kwr{font-family:'Noto Serif JP',serif;font-size:.78rem;font-weight:700;}
.kwf{font-size:.65rem;color:var(--b);font-weight:700;}
.kwm{font-size:.58rem;color:var(--muted);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.ktick{position:absolute;bottom:7px;right:9px;font-size:.85rem;opacity:0;transition:opacity .2s;}
.kc-action{display:flex;gap:5px;margin-top:5px;justify-content:flex-end;}
.kc-btn-sound,.kc-btn-done{
  width:28px;height:28px;border-radius:7px;border:1.5px solid var(--dim);
  background:var(--paper);font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:all .15s;
}
.kc-btn-sound:active{background:var(--ink);color:var(--paper);}
.kc-btn-done{font-size:.8rem;font-weight:800;color:var(--muted);}
.kc-btn-done.active{background:var(--g);border-color:var(--g);color:#fff;}
.kc-btn-done:active{background:var(--g);color:#fff;}
.pager{display:flex;border-top:2px solid var(--ink);}
.pbtn{flex:1;padding:13px;border:none;border-right:2px solid var(--ink);background:var(--paper);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;color:var(--ink);transition:background .12s;}
.pbtn:last-child{border-right:none;}
.pbtn:active{background:var(--dim);}
.pbtn:disabled{opacity:.3;cursor:default;}
.pbtn.pr{background:var(--ink);color:var(--paper);}

/* ═══ DRILL ═══ */
.dw{max-width:500px;margin:0 auto;}
.dhd{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--dim);}
.dpw{flex:1;height:5px;background:var(--dim);border-radius:3px;overflow:hidden;}
.dpf{height:100%;background:var(--a);border-radius:3px;transition:width .3s;}
.dcnt{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--muted);white-space:nowrap;}
.dsc{background:var(--ink);color:var(--paper);font-size:.68rem;font-weight:700;font-family:'Space Mono',monospace;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.dleg{display:flex;gap:7px;padding:6px 14px;flex-wrap:wrap;border-bottom:1px solid var(--dim);}
.dl{display:flex;align-items:center;gap:3px;font-size:.6rem;font-weight:700;color:var(--muted);}
.dlc{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.dtw{padding:9px 14px 0;}
.dtb{display:inline-flex;align-items:center;padding:4px 11px;border-radius:6px;font-size:.65rem;font-weight:800;letter-spacing:.06em;border:1.5px solid;}
.dtb.fw{background:var(--bl);color:var(--b);border-color:var(--b);}
.dtb.rv{background:var(--a2);color:var(--a);border-color:var(--a);}
.dtb.mn{background:var(--gl);color:var(--g);border-color:var(--g);}
.dqc{margin:9px 14px;border-radius:12px;border:2.5px solid var(--ink);overflow:hidden;}
.dqt{background:var(--ink);padding:18px 18px 16px;text-align:center;position:relative;}
.dqt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 65% 20%,rgba(232,93,4,.18) 0%,transparent 65%);pointer-events:none;}
.htb{position:absolute;top:9px;right:11px;z-index:2;font-size:.6rem;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;padding:2px 7px;border:1px solid rgba(255,255,255,.2);border-radius:4px;background:none;font-family:'DM Sans',sans-serif;}
.dqs{font-size:.82rem;color:rgba(255,255,255,.65);margin-bottom:9px;line-height:1.9;}
.dqs .tw{color:#fff;font-family:'Noto Serif JP',serif;font-size:1.1rem;font-weight:700;border-bottom:2px solid var(--a);padding-bottom:1px;}
.dqs .tk{color:var(--a2);font-size:1.05rem;font-weight:700;border-bottom:2px solid var(--a);padding-bottom:1px;}
.dqm{font-family:'Noto Serif JP',serif;font-size:3rem;font-weight:700;color:#fff;line-height:1;}
.dqm.sm{font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:700;}
.dqsub{font-size:.7rem;color:rgba(255,255,255,.4);margin-top:5px;}
.dqb{background:var(--card);padding:7px 13px;font-size:.68rem;color:var(--muted);font-weight:600;border-top:1.5px solid var(--dim);text-align:center;}
.hbox{margin:0 14px 7px;padding:8px 12px;border-radius:7px;background:var(--a2);border-left:3px solid var(--a);font-size:.73rem;color:var(--ink);font-weight:600;line-height:1.6;display:none;}
.hbox.on{display:block;}
.dopts{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 14px 7px;}
.dopt{padding:12px 9px;border-radius:9px;border:2px solid var(--dim);background:var(--card);font-family:'Noto Serif JP','DM Sans',sans-serif;font-size:.83rem;font-weight:700;cursor:pointer;text-align:center;transition:all .13s;color:var(--ink);line-height:1.4;-webkit-tap-highlight-color:transparent;}
.dopt:active:not([disabled]){border-color:var(--ink);background:var(--dim);}
.dopt.ok{border-color:var(--g)!important;background:var(--gl)!important;color:var(--g)!important;}
.dopt.ng{border-color:var(--r)!important;background:var(--rl)!important;color:var(--r)!important;}
.dopt.rv{border-color:var(--g)!important;background:var(--gl)!important;color:var(--g)!important;}
.dfb{margin:0 14px 7px;padding:10px 13px;border-radius:8px;font-size:.78rem;font-weight:600;line-height:1.7;display:none;}
.dfb.on{display:block;}
.dfb.ok{background:var(--gl);border-left:3px solid var(--g);color:#1a4a30;}
.dnxt-btn{width:calc(100% - 28px);margin:0 14px 7px;padding:12px;border-radius:8px;border:2px solid var(--ink);background:var(--ink);color:var(--paper);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s;}
.dnxt-btn:active{background:var(--a);border-color:var(--a);}
.dfb.ng{background:var(--rl);border-left:3px solid var(--r);color:#6b1218;}
.fbr{font-size:.68rem;opacity:.75;margin-top:3px;}
.dres{padding:24px 18px;text-align:center;display:none;}
.dremo{font-size:2.8rem;margin-bottom:8px;}
.drsc{font-family:'Space Mono',monospace;font-size:1.9rem;font-weight:700;color:var(--a);margin-bottom:3px;}
.drsub{font-size:.82rem;color:var(--muted);margin-bottom:16px;}
.drstats{display:flex;gap:7px;justify-content:center;margin-bottom:18px;}
.drst{background:var(--dim);border-radius:8px;padding:9px 14px;min-width:60px;text-align:center;}
.drst .n{font-family:'Space Mono',monospace;font-size:1.15rem;font-weight:700;}
.drst .l{font-size:.58rem;color:var(--muted);font-weight:700;margin-top:2px;}
.drbtns{display:flex;gap:7px;justify-content:center;}
.drbtn{padding:11px 20px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;border:2px solid var(--ink);transition:all .15s;}
.drbtn.pr{background:var(--ink);color:var(--paper);}
.drbtn.ou{background:var(--paper);color:var(--ink);}

/* ═══ EXAM ═══ */
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;}
.ebtn{background:var(--card);border:2px solid var(--dim);border-radius:10px;padding:14px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;transition:all .15s;}
.ebtn:active{border-color:var(--a);background:var(--a2);}
.ey{font-size:.85rem;font-weight:800;color:var(--ink);}
.ecount{font-size:.62rem;color:var(--muted);margin-top:3px;}
.escore{font-size:.62rem;font-weight:700;margin-top:4px;}
.exam-wrap{max-width:500px;margin:0 auto;}
.exam-hd{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--dim);}
.exam-back{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--muted);padding:2px 6px;}
.exam-title{font-size:.85rem;font-weight:800;flex:1;}
.exam-prog{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);}
.eq-wrap{padding:10px 14px 6px;}
.eq-type{display:inline-block;background:var(--bl);color:var(--b);border:1.5px solid var(--b);border-radius:6px;font-size:.62rem;font-weight:800;padding:3px 10px;margin-bottom:8px;}
.eq-type.m2{background:var(--a2);color:var(--a);border-color:var(--a);}
.eq-sent{font-family:'Noto Serif JP',sans-serif;font-size:.88rem;line-height:1.9;color:var(--ink);margin-bottom:10px;background:var(--card);border-radius:8px;padding:12px 14px;border:1.5px solid var(--dim);}
.eq-sent .uw{color:var(--b);font-weight:800;text-decoration:underline;text-underline-offset:3px;}
.eopts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.eopt{padding:12px 9px;border-radius:9px;border:2px solid var(--dim);background:var(--card);font-family:'Noto Serif JP','DM Sans',sans-serif;font-size:.83rem;font-weight:700;cursor:pointer;text-align:center;transition:all .13s;color:var(--ink);-webkit-tap-highlight-color:transparent;}
.eopt:active:not([disabled]){border-color:var(--ink);}
.eopt.ok{border-color:var(--g)!important;background:var(--gl)!important;color:var(--g)!important;}
.eopt.ng{border-color:var(--r)!important;background:var(--rl)!important;color:var(--r)!important;}
.eopt.rv{border-color:var(--g)!important;background:var(--gl)!important;color:var(--g)!important;}
.efb{margin:8px 0 0;padding:10px 13px;border-radius:8px;font-size:.78rem;font-weight:600;line-height:1.7;display:none;}
.efb.on{display:block;}
.efb.ok{background:var(--gl);border-left:3px solid var(--g);color:#1a4a30;}
.efb.ng{background:var(--rl);border-left:3px solid var(--r);color:#6b1218;}
.enxt{display:none;width:100%;margin-top:8px;padding:12px;border-radius:8px;border:none;background:var(--ink);color:var(--paper);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;}
.enxt.on{display:block;}
.exam-res{padding:24px 16px;text-align:center;}
.erem{font-size:2.8rem;margin-bottom:8px;}
.ersc{font-family:'Space Mono',monospace;font-size:1.9rem;font-weight:700;color:var(--a);margin-bottom:3px;}
.ersub{font-size:.82rem;color:var(--muted);margin-bottom:16px;}
.erstats{display:flex;gap:7px;justify-content:center;margin-bottom:16px;}
.erst{background:var(--dim);border-radius:7px;padding:9px 14px;min-width:58px;text-align:center;}
.erst .n{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;}
.erst .l{font-size:.58rem;color:var(--muted);font-weight:700;margin-top:2px;}
.erbtns{display:flex;gap:7px;justify-content:center;}
.erbtn{padding:11px 18px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--ink);}
.erbtn.pr{background:var(--ink);color:var(--paper);}
.erbtn.ou{background:var(--paper);color:var(--ink);}

@keyframes su{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── BOTTOM NAV ── */
.bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:2px solid var(--ink);z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.08);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 11px;cursor:pointer;font-size:.6rem;font-weight:700;color:var(--muted);border:none;background:none;font-family:'DM Sans',sans-serif;gap:3px;border-left:1px solid var(--dim);}
.bnav-item:first-child{border-left:none;}
.bnav-item.active{color:var(--a);background:var(--a2);}
.bnav-icon{font-size:1.2rem;line-height:1;}
body{padding-bottom:60px;}

</style>

<meta name="mobile-web-app-capable" content="yes">

<!-- FILTER (Scan + Drill) -->

    <div class="scan-info" id="si">Lướt qua · nhớ kanji + cách đọc · ★頻出 = hay ra thi</div>

<!-- ═══ DRILL ═══ -->

// ── TTS ──
const TTS = {
  synth: (typeof speechSynthesis !== 'undefined') ? speechSynthesis : null,
  voice: null,
  init(){
    if(!this.synth) return;
    const load = () => {
      const vs = this.synth.getVoices();
      this.voice = vs.find(v=>v.lang.startsWith('ja')) ||
                   vs.find(v=>v.lang.includes('JP')) || null;
    };
    try{
      if(this.synth.getVoices().length) load();
      else this.synth.onvoiceschanged = load;
    }catch(e){}
  },
  say(text, rate=0.88){
    if(!this.synth) return;
    this.synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=rate; u.pitch=1;
    if(this.voice) u.voice=this.voice;
    try{this.synth.speak(u);}catch(e){}
  },
  sayWord(item, type){
    if(!item) return;
    // Chỉ đọc hiragana — không đọc kanji để tránh đọc 2 lần
    if(type==='on')  this.say(item.on.read);
    else if(type==='kun') this.say(item.kun.read);
    else this.say(item.on.read + '。' + item.kun.read);
  }
};

function renderScan(){
  const pool=getPool();
  const s=sPage*PG, e=Math.min(s+PG,pool.length), sl=pool.slice(s,e);
  tx('sn',`${e}/${pool.length}`);
  document.getElementById('spf').style.width=`${Math.round(e/pool.length*100)}%`;
  const grid=document.getElementById('sg'); grid.innerHTML='';
  sl.forEach((k,i)=>{
    const done=M.has(k.k);
    const d=document.createElement('div');
    d.className='kc'+(done?' done':'');
    d.style.animationDelay=(i*.03)+'s';
    d.innerHTML=`<div class="ktop"><span class="kidx">${s+i+1}</span><span class="khot">${k.freq>=2?'★頻出':''}</span></div>
<span class="kk">${k.k}</span>
<div class="khv">${k.hv}</div>
<div class="kvn">${k.vn}</div>
<div class="kwords">
  <div class="kw on"><span class="kwr">${k.on.word}</span><span class="kwf">${k.on.read}</span><span class="kwm">${k.on.meaning}</span></div>
  ${k.kun.word ? '<div class=\"kw kun\"><span class=\"kwr\">'+k.kun.word+'</span><span class=\"kwf\">'+k.kun.read+'</span><span class=\"kwm\">'+k.kun.meaning+'</span></div>' : k.kun.meaning ? '<div class=\"kw note\"><span class=\"kwf\" style=\"font-size:.65rem;color:var(--muted)\">'+k.kun.meaning+'</span></div>' : ''}
</div>
<div class="kc-action">
  <button class="kc-btn-sound">🔊</button>
  <button class="kc-btn-done">✓</button>
</div>`;
    d.onclick=(e)=>{
      if(e.target.closest('.kc-btn-sound')||e.target.closest('.kc-btn-done')) return;
      TTS.synth&&TTS.synth.cancel();
      const cur = d.dataset.tap||'0';
      if(cur==='0'){TTS.say(k.on.read);d.dataset.tap='1';}
      else{TTS.say(k.kun.read);d.dataset.tap='0';}
    };
    // Wire up action buttons synchronously
    const _sd=d.querySelector('.kc-btn-sound');
    const _td=d.querySelector('.kc-btn-done');
    if(_sd) _sd.onclick=(e)=>{e.stopPropagation();TTS.say(k.on.read+'。'+k.kun.read);};
    if(_td){
      if(M.has(k.k)) _td.classList.add('active');
      _td.onclick=(e)=>{
        e.stopPropagation();
        M.has(k.k)?M.delete(k.k):M.add(k.k);
        save();
        _td.classList.toggle('active');
        d.classList.toggle('done');
      };
    }
    grid.appendChild(d);
  });
  document.getElementById('pp').disabled=sPage===0;
  document.getElementById('pn').disabled=e>=pool.length;
}

function makeQ(k){
  const others=shuf(dPool.filter(x=>x.k!==k.k));
  const type=['fw','rv','mn'][Math.floor(Math.random()*3)];
  const useOn=Math.random()>0.35;
  const src=(useOn||!k.kun.word)?k.on:k.kun;
  if(type==='fw'){
    const w=others.slice(0,3).map(x=>useOn?x.on.read:x.kun.read);
    return{type:'fw',badge:'📖 ĐỌC TỪ NÀY LÀ GÌ?',
      sent:`<span class="tw">${src.word}</span> <span class="tk" style="font-size:.85rem">${src.meaning}</span>`,
      main:'',sub:'',bot:`${k.k} = ${k.on.read} · ${k.vn}`,
      correct:src.read,opts:shuf([src.read,...w.slice(0,3)]),
      hint:k.on.read+' vs '+k.kun.read,
      fok:`✅ ${src.word} → ${src.read}（${src.meaning}）`,
      fng:`❌ ${src.word} → ${src.read}\n${k.on.word}(${k.on.read}) · ${k.kun.word}(${k.kun.read})`};
  }
  if(type==='rv'){
    const ww=others.slice(0,3).map(x=>useOn?x.on.word:x.kun.word);
    return{type:'rv',badge:'✏️ CHỌN KANJI ĐÚNG',
      sent:`<span class="tk">${src.read}</span>　（${src.meaning}）`,
      main:'',sub:'',bot:'Cùng âm đọc nhưng kanji khác nhau — dạng hay ra thi!',
      correct:src.word,opts:shuf([src.word,...ww.slice(0,3)]),
      hint:`${k.on.word}(${k.on.read})=On / ${k.kun.word}(${k.kun.read})=Kun`,
      fok:`✅ ${src.read} = ${src.word}（${k.on.read} · ${k.vn}）`,
      fng:`❌ Đáp án: ${src.word} = ${src.read}\n${k.on.word} · ${k.kun.word}`};
  }
  const w=others.slice(0,3).map(x=>x.vn);
  return{type:'mn',badge:'💭 NGHĨA CỦA CHỮ NÀY?',
    sent:'',main:k.k,sub:k.kun.read&&k.kun.read!==k.on.read?`${k.on.read} ／ ${k.kun.read}`:`${k.on.read}`,bot:`${k.on.read} · chọn nghĩa đúng`,
    correct:k.vn,opts:shuf([k.vn,...w.slice(0,3)]),
    hint:`${k.on.word}(${k.on.read})=${k.on.meaning}\n${k.kun.word}(${k.kun.read})=${k.kun.meaning}`,
    fok:`✅ ${k.k} = ${k.vn}（${k.on.read}）`,
    fng:`❌ Đáp án: ${k.vn} · ${k.on.word}・${k.kun.word}`};
}

function renderDrill(){
  if(dIdx>=dPool.length){showDRes();return;}

  const k=dPool[dIdx];const q=makeQ(k);

  if(_qs) setTimeout(()=>TTS.say(_qs.read), 300);
  tx('dcnt',`${dIdx+1}/${dPool.length}`); tx('dsc',`★ ${dSc}`);
  const tb=document.getElementById('dtb');
  tb.textContent=q.badge; tb.className='dtb '+(q.type==='fw'?'fw':q.type==='rv'?'rv':'mn');
  const qs=document.getElementById('dqs');qs.innerHTML=q.sent;qs.style.display=q.sent?'block':'none';
  const qm=document.getElementById('dqm');qm.textContent=q.main;qm.className='dqm'+(q.main.length>3?' sm':'');qm.style.display=q.main?'block':'none';
  const qsub=document.getElementById('dqsub');qsub.textContent=q.sub;qsub.style.display=q.sub?'block':'none';
  tx('dqb',q.bot); document.getElementById('hbox').dataset.hint=q.hint;
  document.getElementById('dfb').className='dfb'; document.getElementById('dfb').innerHTML=''; document.getElementById('dnxt').style.display='none';
  const opts=document.getElementById('dopts');opts.innerHTML='';
  q.opts.forEach(o=>{const btn=document.createElement('button');btn.className='dopt';btn.textContent=o;btn.onclick=()=>ansD(btn,o,q,k);opts.appendChild(btn);});
}

function ansD(btn,chosen,q,k){
  if(dAns)return;dAns=true;const ok=chosen===q.correct;
  if(ok){dOk++;dCb++;dSc+=10+(dCb>1?(dCb-1)*3:0);if(dCb>dMCb)dMCb=dCb;btn.classList.add('ok');}
  else{dNg++;dCb=0;btn.classList.add('ng');document.querySelectorAll('.dopt').forEach(b=>{if(b.textContent===q.correct)b.classList.add('rv');});}
  document.querySelectorAll('.dopt').forEach(b=>b.disabled=true);tx('dsc',`★ ${dSc}`);
  const pts=(ok?q.fok:q.fng).split('\n');
  const fb=document.getElementById('dfb');
  fb.innerHTML=`<div>${pts[0]}${ok&&dCb>1?` 🔥×${dCb}`:''}</div>${pts[1]?`<div class="fbr">${pts[1]}</div>`:''}`;
  // Speak correct answer
  if(ok) setTimeout(()=>TTS.say(k.on.read), 200);
  else setTimeout(()=>TTS.say(k.on.read+'。'+k.kun.read), 300);
  fb.className='dfb on '+(ok?'ok':'ng');
  document.getElementById('dnxt').style.display='block';
}

  tx('drok',dOk); tx('drng',dNg); tx('drcb',dMCb);
}

    const sc=ES[year];
    const btn=document.createElement('button');btn.className='ebtn';
    btn.innerHTML=`<div class="ey">📋 ${(()=>{const y=year.replace('B','');const[m,yr]=y.split('-');return `${yr}年 ${m}月`+(year.endsWith('B')?' ②':'');})()}</div>
<div class="ecount">${total} câu (問1+問2)</div>
<div class="escore" style="color:${sc?'var(--g)':'var(--muted)'}">${sc?`✅ Điểm tốt nhất: ${sc}%`:'Chưa làm'}</div>`;
    btn.onclick=()=>startExam(year);
    grid.appendChild(btn);
  });
}

function startExam(year){
  curExam=year; eIdx=0; eOk=0; eNg=0;
  const d=EXAM_DATA[year];
  eQs=[...(d.m1||[]).map(q=>({...q,type:'m1'})),...(d.m2||[]).map(q=>({...q,type:'m2'}))];
  sh('elist','none'); sh('eres','none'); sh('etake','block');
  tx('etitle',`Đề N3 ${year.replace('B','').replace('-','年 ')+'月'+(year.endsWith('B')?' ②':'')}`);
  renderEQ();
}

function renderEQ(){
  if(eIdx>=eQs.length){showERes();return;}
  const q=eQs[eIdx];
  tx('eprog',`${eIdx+1}/${eQs.length}`);
  const qt=document.getElementById('eqtype');
  qt.textContent=q.type==='m1'?'問題1 — 読み方':'問題2 — 漢字で書く';
  qt.className='eq-type'+(q.type==='m2'?' m2':'');
  // Highlight tested word in sentence
  const sent=document.getElementById('eqsent');
  if(q.word){
    sent.innerHTML=q.q.replace(q.word,`<span class="uw">${q.word}</span>`);
  } else {sent.textContent=q.q;}
  document.getElementById('efb').className='efb';
  document.getElementById('enxt').className='enxt';
  const opts=document.getElementById('eopts'); opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');btn.className='eopt';
    btn.innerHTML=`<span style="color:var(--muted);font-size:.65rem;margin-right:4px">${i+1}</span>${o}`;
    btn.onclick=()=>ansE(btn,i,q);
    opts.appendChild(btn);
  });
}

function ansE(btn,idx,q){
  if(btn.disabled)return;
  const ok=idx===q.ans;
  if(ok)eOk++;else eNg++;
  if(ok)btn.classList.add('ok');
  else{btn.classList.add('ng');document.querySelectorAll('.eopt').forEach((b,i)=>{if(i===q.ans)b.classList.add('rv');});}
  document.querySelectorAll('.eopt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('efb');
  const pts=q.exp.split('\n');
  fb.innerHTML=`<div>${ok?'✅':'❌'} ${pts[0]}</div>${pts[1]?`<div class="fbr">${pts[1]}</div>`:''}`;
  fb.className='efb on '+(ok?'ok':'ng');
  document.getElementById('enxt').className='enxt on';
}

function nextEQ(){eIdx++;renderEQ();}

function showERes(){
  sh('etake','none'); sh('eres','block');
  const total=eOk+eNg, pct=total>0?Math.round(eOk/total*100):0;
  if(!ES[curExam]||pct>ES[curExam]){ES[curExam]=pct;saveES();}
  tx('erem',pct>=85?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚');
  tx('ersc',`${eOk}/${total}`); tx('ersub',`${pct}% đúng`);
  tx('erok',eOk); tx('erng',eNg); tx('erpct',pct+'%');
  document.getElementById('erredo').onclick=()=>startExam(curExam);
  renderExamList();
}

function backExam(){sh('etake','none');sh('eres','none');sh('elist','block');renderExamList();}
function redoExam(){startExam(curExam);}
